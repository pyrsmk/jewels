<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jewels</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #050507; color: #ddd; font: 12px/1.35 system-ui, sans-serif; }
    #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; overflow: hidden; }
    #controls {
      overflow: auto;
      min-height: 0;
      padding: 12px;
      border-right: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(18,18,24,.95), rgba(10,10,14,.95));
    }
    #controls h1 { margin: 0; font-size: 15px; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .spacer { flex: 1; }
    .fullscreen { width: 100px; }
    #fps { font-size: 12px; color: #8f9bb3; }
    .group { margin: 0 0 12px; padding: 10px; border: 1px solid rgba(255,255,255,.08); border-radius: 8px; }
    .group h2 { margin: 0 0 8px; font-size: 12px; font-weight: 700; }
    label { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; margin: 6px 0; }
    input[type="range"], select, button { width: 100%; }
    input[type="checkbox"] { justify-self: end; }
    .value { min-width: 50px; text-align: right; color: #aaa; }
    #colors .row { display: grid; grid-template-columns: 1fr 32px; gap: 6px; margin: 6px 0; }
    button { background: #181a22; color: #ddd; border: 1px solid rgba(255,255,255,.12); border-radius: 6px; padding: 7px 8px; cursor: pointer; }
    button:hover { background: #202434; }
    #canvasWrap { position: relative; min-width: 0; min-height: 0; overflow: hidden; }
    #canvasWrap:fullscreen { width: 100vw; height: 100vh; background: #050507; cursor: none; }
    #canvasWrap:fullscreen canvas { width: 100%; height: 100%; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>

<div id="app">
  <div id="controls">
    <div class="header">
      <h1>Jewels</h1>
      <div class="spacer"></div>
      <button class="fullscreen" id="fullscreenBtn" type="button">Plein écran</button>
      <div class="spacer"></div>
      <div id="fps">0 FPS</div>
    </div>

    <div class="group">
      <h2>Particules</h2>
      <label>Forme</label>
      <select id="particleShape">
        <option value="circle" selected>Cercle</option>
        <option value="pixel">Pixels</option>
        <option value="flowline">Flows</option>
        <option value="softsquare">Carré soft</option>
        <option value="core">Core</option>
      </select>

      <label>Direction globale</label>
      <select id="flowDirection">
        <option value="horizontal">Horizontal</option>
        <option value="vertical">Vertical</option>
        <option value="diagonal">Diagonal</option>
        <option value="free" selected>Libre</option>
      </select>

      <label>Nombre <span class="value" id="particleCountVal"></span></label>
      <input id="particleCount" type="range" min="0" max="1" step="0.001" value="0.316" />

      <label>Vitesse <span class="value" id="speedVal"></span></label>
      <input id="speed" type="range" min="0" max="1" step="0.001" value="0.119" />

      <label>Taille <span class="value" id="sizeVal"></span></label>
      <input id="size" type="range" min="1" max="24" step="0.1" value="9" />

      <label>Pseudo-3D <input id="pseudo3d" type="checkbox" checked /></label>
      <label>Profondeur pseudo-3D <input id="pseudo3dSize" type="checkbox" checked /></label>
    </div>

    <div class="group">
      <h2>Couleurs</h2>
      <label><input id="colorEnabled" type="checkbox" checked /> Activer</label>

      <div id="colors"></div>
      <button id="addColor" type="button">Ajouter une couleur</button>
    </div>

    <div class="group">
      <h2>Glow</h2>
      <label><input id="glowEnabled" type="checkbox" checked> Activer</label>

      <label>Intensité <span class="value" id="glowVal"></span></label>
      <input id="glow" type="range" min="0" max="2.5" step="0.01" value="1.30" />

      <label>Réponse au grain <span class="value" id="glowGrainResponseVal"></span></label>
      <input id="glowGrainResponse" type="range" min="0" max="1" step="0.01" value="1.0" />

      <label>Mode</label>
      <select id="glowMode">
        <option value="simple">Simple</option>
        <option value="post" selected>Post-process</option>
        <option value="post2">Post-process v2</option>
      </select>
    </div>

    <div class="group">
      <h2>Dreamy Glow</h2>
      <label><input id="dreamyEnabled" type="checkbox" checked /> Activer</label>

      <label>Intensité <span class="value" id="dreamyVal"></span></label>
      <input id="dreamyGlow" type="range" min="0" max="5" step="0.01" value="4" />

      <label>Réponse au grain <span class="value" id="dreamyGrainResponseVal"></span></label>
      <input id="dreamyGrainResponse" type="range" min="0" max="1" step="0.01" value="1.0" />

      <label>Amplification aux bords <span class="value" id="dreamyEdgeBoostVal"></span></label>
      <input id="dreamyEdgeBoost" type="range" min="0" max="5" step="0.01" value="3" />
    </div>

    <div class="group">
      <h2>Grain</h2>
      <label><input id="filmGrain" type="checkbox" checked /> Activer</label>

      <label>Intensité <span class="value" id="grainAmountVal"></span></label>
      <input id="grainAmount" type="range" min="0" max="10" step="0.01" value="3.0" />

      <label>Mode</label>
      <select id="grainMode">
        <option value="scan">Balayage</option>
        <option value="static">Stable</option>
        <option value="celluloid" selected>Celluloïde</option>
      </select>
    </div>

    <div class="group">
      <h2>Aberration chromatique</h2>
      <label><input id="chromatic" type="checkbox" checked /> Activer</label>

      <label>Largeur <span class="value" id="chromaticWidthVal"></span></label>
      <input id="chromaticWidth" type="range" min="0.05" max="1.0" step="0.01" value="0.55" />

      <label>Décalage <span class="value" id="chromaticOffsetVal"></span></label>
      <input id="chromaticOffset" type="range" min="0.0" max="3.0" step="0.01" value="0.75" />

      <label>Mode</label>
      <select id="chromaticMode">
        <option value="particles">Particules</option>
        <option value="edges" selected>Bords écran</option>
      </select>
    </div>

    <div class="group">
      <h2>Lens flare</h2>
      <label><input id="lensFlare" type="checkbox" checked /> Activer</label>

      <label>Réponse au grain <span class="value" id="lensFlareGrainResponseVal"></span></label>
      <input id="lensFlareGrainResponse" type="range" min="0" max="1" step="0.01" value="0.5" />

      <label>Type</label>
      <select id="lensFlareType">
        <option value="horizontal" selected>Horizontal</option>
        <option value="vertical">Vertical</option>
        <option value="star">Etoile</option>
      </select>

      <label>Anamorphic stretch <input id="lensFlareAnamorphic" type="checkbox" checked /></label>

      <label>Epaisseur <span class="value" id="flareThicknessVal"></span></label>
      <input id="flareThickness" type="range" min="0" max="10" step="0.1" value="3" />

      <label>Longueur (%) <span class="value" id="flareLengthVal"></span></label>
      <input id="flareLength" type="range" min="5" max="100" step="1" value="60" />

      <label>Diffusion <span class="value" id="flareDiffusionVal"></span></label>
      <input id="flareDiffusion" type="range" min="0" max="5" step="0.1" value="2.5" />

      <label>Durée (ms) <span class="value" id="flareDurationVal"></span></label>
      <input id="flareDuration" type="range" min="100" max="20000" step="10" value="4000" />

      <label>Intervalle min de déclenchement (s) <span class="value" id="flareMinVal"></span></label>
      <input id="flareMin" type="range" min="1" max="30" step="0.5" value="10" />

      <label>Intervalle max de déclenchement (s) <span class="value" id="flareMaxVal"></span></label>
      <input id="flareMax" type="range" min="5" max="60" step="0.5" value="60" />

      <label>Fade in (%) <span class="value" id="flareFadeInVal"></span></label>
      <input id="flareFadeIn" type="range" min="0" max="100" step="1" value="13" />

      <label>Hold (%) <span class="value" id="flareHoldVal"></span></label>
      <input id="flareHold" type="range" min="0" max="100" step="1" value="10" />

      <label>Fade out (%) <span class="value" id="flareFadeOutVal"></span></label>
      <input id="flareFadeOut" type="range" min="0" max="100" step="1" value="77" />

      <label>Distance aux bords (px) <span class="value" id="flareEdgeDistanceVal"></span></label>
      <input id="flareEdgeDistance" type="range" min="0" max="500" step="1" value="0" />

      <label>Activer les ghost reflections <input id="ghostEnabled" type="checkbox" checked /></label>

      <label>Intensité des ghosts <span class="value" id="ghostIntensityVal"></span></label>
      <input id="ghostIntensity" type="range" min="0" max="1" step="0.01" value="0.3" />

      <label>Nombre de ghosts <span class="value" id="ghostCountVal"></span></label>
      <input id="ghostCount" type="range" min="1" max="5" step="1" value="2" />

      <label>Espacement des ghosts <span class="value" id="ghostSpacingVal"></span></label>
      <input id="ghostSpacing" type="range" min="0.05" max="0.40" step="0.01" value="0.18" />

      <label>Taille des ghosts <span class="value" id="ghostSizeVal"></span></label>
      <input id="ghostSize" type="range" min="0.2" max="2.5" step="0.01" value="2" />

      <label>Diffusion des ghosts <span class="value" id="ghostDiffusionVal"></span></label>
      <input id="ghostDiffusion" type="range" min="0.2" max="4.0" step="0.01" value="4" />

      <label>Décroissance des ghosts <span class="value" id="ghostDecayVal"></span></label>
      <input id="ghostDecay" type="range" min="0.0" max="1.0" step="0.01" value="0.50" />
    </div>
  </div>

  <div id="canvasWrap">
    <canvas id="glcanvas"></canvas>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('glcanvas');
  const gl = canvas.getContext('webgl', {
    antialias: true,
    premultipliedAlpha: false,
    preserveDrawingBuffer: false,
  });

  if (!gl) {
    document.body.innerHTML = '<div style="padding:20px">WebGL non disponible.</div>';
    return;
  }

  const controls = {
    particleCount: document.getElementById('particleCount'),
    speed: document.getElementById('speed'),
    size: document.getElementById('size'),
    particleShape: document.getElementById('particleShape'),
    flowDirection: document.getElementById('flowDirection'),    pseudo3d: document.getElementById('pseudo3d'),
    pseudo3dSize: document.getElementById('pseudo3dSize'),
    glow: document.getElementById('glow'),
    glowGrainResponse: document.getElementById('glowGrainResponse'),
    glowMode: document.getElementById('glowMode'),
    dreamyGlow: document.getElementById('dreamyGlow'),
    dreamyGrainResponse: document.getElementById('dreamyGrainResponse'),
    dreamyEdgeBoost: document.getElementById('dreamyEdgeBoost'),
    filmGrain: document.getElementById('filmGrain'),
    grainMode: document.getElementById('grainMode'),
    grainAmount: document.getElementById('grainAmount'),
    chromatic: document.getElementById('chromatic'),
    chromaticMode: document.getElementById('chromaticMode'),
    chromaticWidth: document.getElementById('chromaticWidth'),
    chromaticOffset: document.getElementById('chromaticOffset'),
    lensFlare: document.getElementById('lensFlare'),
    lensFlareGrainResponse: document.getElementById('lensFlareGrainResponse'),
    lensFlareType: document.getElementById('lensFlareType'),
    lensFlareAnamorphic: document.getElementById('lensFlareAnamorphic'),
    flareThickness: document.getElementById('flareThickness'),
    flareLength: document.getElementById('flareLength'),
    flareDiffusion: document.getElementById('flareDiffusion'),
    flareDuration: document.getElementById('flareDuration'),
    flareMin: document.getElementById('flareMin'),
    flareMax: document.getElementById('flareMax'),
    flareFadeIn: document.getElementById('flareFadeIn'),
    flareHold: document.getElementById('flareHold'),
    flareFadeOut: document.getElementById('flareFadeOut'),
    flareEdgeDistance: document.getElementById('flareEdgeDistance'),
    ghostEnabled: document.getElementById('ghostEnabled'),
    ghostIntensity: document.getElementById('ghostIntensity'),
    ghostCount: document.getElementById('ghostCount'),
    ghostSpacing: document.getElementById('ghostSpacing'),
    ghostSize: document.getElementById('ghostSize'),
    ghostDiffusion: document.getElementById('ghostDiffusion'),
    ghostDecay: document.getElementById('ghostDecay'),
    colorEnabled: document.getElementById('colorEnabled'),
    glowEnabled: document.getElementById('glowEnabled'),
    dreamyEnabled: document.getElementById('dreamyEnabled'),
    fullscreenBtn: document.getElementById('fullscreenBtn'),
  };

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function smoothstep01(t) {
  t = Math.max(0, Math.min(1, t));
  return t * t * (3 - 2 * t);
}

function particleCountFromSlider() {
  const t = +controls.particleCount.value;

  if (t < 0.20) {
    const local = smoothstep01(t / 0.20);
    return Math.round(lerp(100, 1000, local));
  }

  if (t < 0.85) {
    const local = smoothstep01((t - 0.20) / 0.65);
    return Math.round(lerp(1000, 50000, local));
  }

  const local = smoothstep01((t - 0.85) / 0.15);
  return Math.round(lerp(50000, 100000, local));
}

function particleSpeedFromSlider() {
  const t = +controls.speed.value;

  if (t < 0.5) {
    const local = t / 0.5;
    return 0.4 * local;
  }

  const local = (t - 0.5) / 0.5;
  return 0.4 + (3.0 - 0.4) * local;
}

function particleSpeedDisplayPxPerSec() {
  const speed = particleSpeedFromSlider();

  // Référence fixe d'affichage pour que la valeur en px/s reste stable
  // indépendamment de la taille du canvas ou de l'ouverture de la console.
  const referencePxScale = 540.0;
  const flowDisplayRef = 0.0065;

  return speed * flowDisplayRef * 60.0 * referencePxScale;
}



  const valueEls = {
    particleCount: document.getElementById('particleCountVal'),    speed: document.getElementById('speedVal'),
    size: document.getElementById('sizeVal'),
    glow: document.getElementById('glowVal'),
    glowGrainResponse: document.getElementById('glowGrainResponseVal'),
    dreamy: document.getElementById('dreamyVal'),
    dreamyGrainResponse: document.getElementById('dreamyGrainResponseVal'),
    dreamyEdgeBoost: document.getElementById('dreamyEdgeBoostVal'),
    grainAmount: document.getElementById('grainAmountVal'),
    chromaticWidth: document.getElementById('chromaticWidthVal'),
    chromaticOffset: document.getElementById('chromaticOffsetVal'),
    flareDuration: document.getElementById('flareDurationVal'),
    lensFlareGrainResponse: document.getElementById('lensFlareGrainResponseVal'),
    flareMin: document.getElementById('flareMinVal'),
    flareMax: document.getElementById('flareMaxVal'),
    flareThickness: document.getElementById('flareThicknessVal'),
    flareLength: document.getElementById('flareLengthVal'),
    flareDiffusion: document.getElementById('flareDiffusionVal'),
    flareFadeIn: document.getElementById('flareFadeInVal'),
    flareHold: document.getElementById('flareHoldVal'),
    flareFadeOut: document.getElementById('flareFadeOutVal'),
    flareEdgeDistance: document.getElementById('flareEdgeDistanceVal'),
    ghostIntensity: document.getElementById('ghostIntensityVal'),
    ghostCount: document.getElementById('ghostCountVal'),
    ghostSpacing: document.getElementById('ghostSpacingVal'),
    ghostSize: document.getElementById('ghostSizeVal'),
    ghostDiffusion: document.getElementById('ghostDiffusionVal'),
    ghostDecay: document.getElementById('ghostDecayVal'),  };

  const colorList = document.getElementById('colors');
  const addColorBtn = document.getElementById('addColor');
  const defaultColors = ['#5900ff', '#00d5ff'];

  function addColor(hex = '#ffffff') {
    const row = document.createElement('div');
    row.className = 'row';
    const input = document.createElement('input');
    input.type = 'color';
    input.value = hex;
    const del = document.createElement('button');
    del.type = 'button';
    del.textContent = '×';
    del.onclick = () => {
      row.remove();
      rebuildAccentCache();
      persistSettingsToUrl();
    };
    row.append(input, del);
    colorList.appendChild(row);
  }

  defaultColors.forEach(addColor);
  addColorBtn.onclick = () => {
    addColor('#ffffff');
    rebuildAccentCache();
    persistSettingsToUrl();
  };

  function rgbFromHex(hex) {
    const n = parseInt(hex.slice(1), 16);
    return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
  }

  let accentCache = new Float32Array(24);
  let accentCountCache = 0;

  function rebuildAccentCache() {
    const nodes = [...colorList.querySelectorAll('input[type="color"]')].slice(0, 8);
    accentCountCache = nodes.length;
    for (let i = 0; i < 8; i++) {
      const o = i * 3;
      if (i < nodes.length) {
        const rgb = rgbFromHex(nodes[i].value);
        accentCache[o] = rgb[0];
        accentCache[o + 1] = rgb[1];
        accentCache[o + 2] = rgb[2];
      } else {
        accentCache[o] = 0;
        accentCache[o + 1] = 0;
        accentCache[o + 2] = 0;
      }
    }
  }


  colorList.addEventListener('input', rebuildAccentCache);
  rebuildAccentCache();

  function encodeSettingsBase64(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }

  function decodeSettingsBase64(str) {
    return decodeURIComponent(escape(atob(str)));
  }

  function getControlValue(el) {
    if (!el) return undefined;
    if (el.type === 'checkbox') return !!el.checked;
    return el.value;
  }

  function captureSettings() {
    const settings = {};
    for (const [key, el] of Object.entries(controls)) {
      if (!el) continue;
      settings[key] = getControlValue(el);
    }
    settings.colors = [...colorList.querySelectorAll('input[type="color"]')].map((input) => input.value);
    return settings;
  }

  function applyControlValue(el, value) {
    if (!el || value === undefined || value === null) return;
    if (el.type === 'checkbox') {
      if (typeof value === 'boolean') el.checked = value;
      else if (value === 'true' || value === 'false') el.checked = value === 'true';
      return;
    }

    if (el.tagName === 'SELECT') {
      const exists = [...el.options].some((opt) => opt.value === String(value));
      if (exists) el.value = String(value);
      return;
    }

    if (el.type === 'range') {
      const num = Number(value);
      const min = Number(el.min);
      const max = Number(el.max);
      if (!Number.isFinite(num)) return;
      if (Number.isFinite(min) && num < min) return;
      if (Number.isFinite(max) && num > max) return;
      el.value = String(num);
      return;
    }

    el.value = String(value);
  }

  function applySavedColors(colors) {
    if (!Array.isArray(colors)) return;
    colorList.innerHTML = '';
    const valid = colors.filter((c) => typeof c === 'string' && /^#[0-9a-fA-F]{6}$/.test(c)).slice(0, 8);
    if (!valid.length) return;
    valid.forEach(addColor);
    rebuildAccentCache();
  }

  function loadSettingsFromUrl() {
    try {
      const url = new URL(window.location.href);
      const encoded = url.searchParams.get('settings');
      if (!encoded) return;

      const decoded = decodeSettingsBase64(encoded);
      const settings = JSON.parse(decoded);
      if (!settings || typeof settings !== 'object') return;

      if (settings.colors !== undefined) applySavedColors(settings.colors);

      for (const [key, value] of Object.entries(settings)) {
        if (key === 'colors') continue;
        if (!(key in controls)) continue;
        applyControlValue(controls[key], value);
      }

      rebuildAccentCache();
    } catch (err) {
      console.warn('Impossible de restaurer les paramètres depuis l’URL:', err);
    }
  }

  function persistSettingsToUrl() {
    try {
      const url = new URL(window.location.href);
      const json = JSON.stringify(captureSettings());
      url.searchParams.set('settings', encodeSettingsBase64(json));
      window.history.replaceState({}, '', url.toString());
    } catch (err) {
      console.warn('Impossible de sauvegarder les paramètres dans l’URL:', err);
    }
  }

  function bindSettingsPersistence() {
    const persist = (event) => {
      rebuildAccentCache();
      if (event && (
        event.target === controls.flareMin ||
        event.target === controls.flareMax ||
        event.target === controls.lensFlare
      )) {
        if (!controls.lensFlare.checked) {
          flareEvent.active = false;
          flareEvent.nextAt = Infinity;
          flareState = { x: 0.5, y: 0.5, s: 0 };
        } else {
          scheduleNextFlare(performance.now() * 0.001);
        }
      }
      persistSettingsToUrl();
    };

    for (const el of Object.values(controls)) {
      if (!el) continue;
      el.addEventListener('input', persist);
      el.addEventListener('change', persist);
    }

    colorList.addEventListener('input', persist);
    colorList.addEventListener('change', persist);
  }

  syncFullscreenButton();
  loadSettingsFromUrl();
  bindSettingsPersistence();
  persistSettingsToUrl();

  function compile(type, src) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, src);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      throw new Error(gl.getShaderInfoLog(shader));
    }
    return shader;
  }

  function program(vs, fs) {
    const p = gl.createProgram();
    gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
    gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(p));
    }
    return p;
  }

  const particleVS = `
    precision highp float;
    attribute vec4 a_data;
    uniform vec2 u_camera;
    uniform float u_pseudo3d;
    uniform float u_glow;
    uniform float u_size;
    uniform float u_dpr;
    uniform float u_pseudo3dSize;
    varying float v_depth;
    varying float v_alpha;
    varying vec2 v_sceneUv;
    void main() {
      vec2 pos = a_data.xy + u_camera;
      gl_Position = vec4(pos, 0.0, 1.0);
      v_sceneUv = pos * 0.5 + 0.5;
      v_alpha = a_data.w;
      float depth = mix(1.0, 0.25 + a_data.z * 0.95, u_pseudo3d);
      float sizePx = u_size;
      sizePx *= mix(1.0, mix(0.7, 1.0, depth), u_pseudo3dSize);
      gl_PointSize = max(sizePx * u_dpr, 1.0);
      v_depth = depth;
    }
  `;

  const particleFS = `
    precision highp float;
    varying float v_depth;
    varying float v_alpha;
    varying vec2 v_sceneUv;
    uniform vec3 u_accents[8];
    uniform int u_accentCount;
    uniform float u_colorEnabled;
    uniform float u_particleShape;

    vec3 paletteColor(float t) {
      if (u_accentCount <= 0) return vec3(0.02, 0.035, 0.09);
      if (u_accentCount == 1) return u_accents[0];
      float scaled = clamp(t, 0.0, 0.9999) * float(u_accentCount - 1);
      int i0 = int(floor(scaled));
      int i1 = i0 + 1;
      if (i1 >= u_accentCount) i1 = u_accentCount - 1;
      float f = fract(scaled);
      vec3 c0 = vec3(0.0);
      vec3 c1 = vec3(0.0);
      for (int i = 0; i < 8; i++) {
        if (i == i0) c0 = u_accents[i];
        if (i == i1) c1 = u_accents[i];
      }
      return mix(c0, c1, f);
    }

    float hash21(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
    }

    float noise21(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      float a = hash21(i);
      float b = hash21(i + vec2(1.0, 0.0));
      float c = hash21(i + vec2(0.0, 1.0));
      float d = hash21(i + vec2(1.0, 1.0));
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
    }

    mat2 rot(float a) {
      float s = sin(a);
      float c = cos(a);
      return mat2(c, -s, s, c);
    }

    float sdBox(vec2 p, vec2 b) {
      vec2 d = abs(p) - b;
      return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
    }

    float sdRoundBox(vec2 p, vec2 b, float r) {
      vec2 q = abs(p) - b + vec2(r);
      return length(max(q, 0.0)) + min(max(q.x, q.y), 0.0) - r;
    }

    float particleFlowAngle(vec2 uv) {
      vec2 q = uv * 6.0 + vec2(1.7, -2.3);
      float n1 = noise21(q);
      float n2 = noise21(q + vec2(4.2, 7.1));
      return (n1 * 2.0 - 1.0) * 1.8 + (n2 * 2.0 - 1.0) * 0.35;
    }

    void main() {
      vec2 p = gl_PointCoord * 2.0 - 1.0;
      float r = length(p);

      vec3 base = vec3(0.02, 0.035, 0.09) * mix(0.75, 1.25, v_depth);
      if (u_colorEnabled > 0.5 && u_accentCount > 0) {
        vec3 pal = paletteColor(clamp(v_sceneUv.x, 0.0, 1.0));
        base = pal * mix(0.42, 0.82, v_depth);
      }

      float shape = floor(u_particleShape + 0.5);
float mask = 0.0;
float halo = 0.0;
float sparkle = 0.0;
float sizeNorm = 1.0;

float randRot = (hash21(floor(v_sceneUv * 512.0)) - 0.5) * 0.4;
vec2 pr = rot(randRot) * p;

if (shape < 0.5) {
  // Cercle
  sizeNorm = 1.00;
  vec2 ps = p / sizeNorm;
  float rs = length(ps);
  if (rs > 1.0) discard;
  float core = smoothstep(0.65, 0.0, rs);
  float ring = smoothstep(0.98, 0.72, rs) * smoothstep(0.35, 0.55, rs);
  halo = smoothstep(1.0, 0.15, rs);
  mask = max(core * 0.55, ring * 0.95);
  sparkle = ring * 0.9;

} else if (shape < 1.5) {
  // Pixel
  sizeNorm = 1.16;
  vec2 q = pr / sizeNorm;
  float d = max(abs(q.x), abs(q.y)) - 0.78;
  if (d > 0.0) discard;
  mask = 0.92;
  halo = 0.02;

} else if (shape < 2.5) {
  // Flow
  sizeNorm = 1.22;
  float a = particleFlowAngle(v_sceneUv) + randRot;
  vec2 q = rot(a) * (p / sizeNorm);
  float line = exp(-pow(abs(q.y) / 0.16, 2.0)) * exp(-pow(abs(q.x) / 1.02, 2.0));
  mask = line;
  halo = exp(-pow(abs(q.y) / 0.34, 2.0)) * exp(-pow(abs(q.x) / 1.22, 2.0)) * 0.18;
  if (mask + halo < 0.01) discard;

} else if (shape < 3.5) {
  // Carré soft
  sizeNorm = 1.08;
  vec2 q = pr / sizeNorm;
  float box = max(abs(q.x), abs(q.y));
  float soft = smoothstep(0.95, 0.2, box);
  float inner = smoothstep(0.6, 0.0, box);
  if (soft <= 0.001) discard;
  mask = soft * (0.6 + inner * 0.4);
  halo = smoothstep(1.1, 0.35, box) * 0.15;

} else {
  // Core
  sizeNorm = 1.05;
  vec2 qs = p / sizeNorm;
  float rs = length(qs);
  if (rs > 1.0) discard;
  float c1 = smoothstep(1.0, 0.0, rs);
  float c2 = smoothstep(0.8, 0.0, rs);
  mask = c1 * 0.62 + c2 * 0.46;
  halo = smoothstep(1.0, 0.35, rs) * 0.18;
}

vec3 col = base * (0.82 + mask * 0.92);
      col += vec3(1.0) * sparkle;
      col += vec3(1.0) * halo * 0.32;
      float alpha = clamp(mask + halo * 0.6, 0.0, 1.0) * v_alpha;
      if (alpha <= 0.001) discard;
      gl_FragColor = vec4(col, alpha);
    }
  `;

  const quadVS = `
    precision highp float;
    attribute vec2 a_pos;
    varying vec2 v_uv;
    void main() {
      v_uv = a_pos * 0.5 + 0.5;
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;

  const blitFS = `
    precision highp float;
    varying vec2 v_uv;
    uniform sampler2D u_tex;
    void main() {
      gl_FragColor = texture2D(u_tex, v_uv);
    }
  `;

  const postFS = `
    precision highp float;
    varying vec2 v_uv;
    uniform sampler2D u_scene;
    uniform sampler2D u_prev;
    uniform vec2 u_resolution;
    uniform float u_time;
    uniform float u_glow;
    uniform float u_glowMode;
    uniform float u_dreamyGlow;
    uniform float u_dreamyEdgeBoost;
    uniform float u_filmGrain;
    uniform float u_grainMode;
    uniform float u_grainAmount;
    uniform float u_glowGrainResponse;
    uniform float u_dreamyGrainResponse;
    uniform float u_lensFlareGrainResponse;
    uniform float u_chromatic;
    uniform float u_chromaticMode;
    uniform float u_chromaticWidth;
    uniform float u_chromaticOffset;
    uniform float u_lensMode;
    uniform float u_lensAnamorphic;
    uniform float u_lensThickness;
    uniform float u_lensLength;
    uniform float u_lensDiffusion;
    uniform float u_ghostEnabled;
    uniform float u_ghostIntensity;
    uniform float u_ghostCount;
    uniform float u_ghostSpacing;
    uniform float u_ghostSize;
    uniform float u_ghostDiffusion;
    uniform float u_ghostDecay;
    uniform vec2 u_flarePos;
    uniform float u_flareStrength;
    uniform vec3 u_accents[8];
    uniform int u_accentCount;
    uniform float u_colorEnabled;

    vec3 sampleScene(vec2 uv) { return texture2D(u_scene, uv).rgb; }

    vec3 paletteColor(float t) {
      if (u_accentCount <= 0) return vec3(1.0);
      if (u_accentCount == 1) return u_accents[0];
      float scaled = clamp(t, 0.0, 0.9999) * float(u_accentCount - 1);
      int i0 = int(floor(scaled));
      int i1 = i0 + 1;
      if (i1 >= u_accentCount) i1 = u_accentCount - 1;
      float f = fract(scaled);
      vec3 c0 = vec3(0.0);
      vec3 c1 = vec3(0.0);
      for (int i = 0; i < 8; i++) {
        if (i == i0) c0 = u_accents[i];
        if (i == i1) c1 = u_accents[i];
      }
      return mix(c0, c1, f);
    }

    vec3 blurCross9(vec2 uv, float radius) {
      vec2 px = 1.0 / u_resolution;
      vec2 off = px * radius;
      vec3 s = vec3(0.0);
      s += sampleScene(uv - vec2(4.0 * off.x, 0.0)) * 0.05;
      s += sampleScene(uv - vec2(3.0 * off.x, 0.0)) * 0.09;
      s += sampleScene(uv - vec2(2.0 * off.x, 0.0)) * 0.12;
      s += sampleScene(uv - vec2(1.0 * off.x, 0.0)) * 0.15;
      s += sampleScene(uv) * 0.18;
      s += sampleScene(uv + vec2(1.0 * off.x, 0.0)) * 0.15;
      s += sampleScene(uv + vec2(2.0 * off.x, 0.0)) * 0.12;
      s += sampleScene(uv + vec2(3.0 * off.x, 0.0)) * 0.09;
      s += sampleScene(uv + vec2(4.0 * off.x, 0.0)) * 0.05;
      s += sampleScene(uv - vec2(0.0, 4.0 * off.y)) * 0.05;
      s += sampleScene(uv - vec2(0.0, 3.0 * off.y)) * 0.09;
      s += sampleScene(uv - vec2(0.0, 2.0 * off.y)) * 0.12;
      s += sampleScene(uv - vec2(0.0, 1.0 * off.y)) * 0.15;
      s += sampleScene(uv + vec2(0.0, 1.0 * off.y)) * 0.15;
      s += sampleScene(uv + vec2(0.0, 2.0 * off.y)) * 0.12;
      s += sampleScene(uv + vec2(0.0, 3.0 * off.y)) * 0.09;
      s += sampleScene(uv + vec2(0.0, 4.0 * off.y)) * 0.05;
      return s * 0.5;
    }

    vec3 sampleBrightScene(vec2 uv) {
      vec3 src = sampleScene(uv);
      float lum = dot(src, vec3(0.2126, 0.7152, 0.0722));
      float bright = smoothstep(0.10, 0.85, lum);
      return src * bright;
    }

    vec3 blurBrightCross9(vec2 uv, float radius) {
      vec2 px = 1.0 / u_resolution;
      vec2 off = px * radius;
      vec3 s = vec3(0.0);
      s += sampleBrightScene(uv - vec2(4.0 * off.x, 0.0)) * 0.05;
      s += sampleBrightScene(uv - vec2(3.0 * off.x, 0.0)) * 0.09;
      s += sampleBrightScene(uv - vec2(2.0 * off.x, 0.0)) * 0.12;
      s += sampleBrightScene(uv - vec2(1.0 * off.x, 0.0)) * 0.15;
      s += sampleBrightScene(uv) * 0.18;
      s += sampleBrightScene(uv + vec2(1.0 * off.x, 0.0)) * 0.15;
      s += sampleBrightScene(uv + vec2(2.0 * off.x, 0.0)) * 0.12;
      s += sampleBrightScene(uv + vec2(3.0 * off.x, 0.0)) * 0.09;
      s += sampleBrightScene(uv + vec2(4.0 * off.x, 0.0)) * 0.05;
      s += sampleBrightScene(uv - vec2(0.0, 4.0 * off.y)) * 0.05;
      s += sampleBrightScene(uv - vec2(0.0, 3.0 * off.y)) * 0.09;
      s += sampleBrightScene(uv - vec2(0.0, 2.0 * off.y)) * 0.12;
      s += sampleBrightScene(uv - vec2(0.0, 1.0 * off.y)) * 0.15;
      s += sampleBrightScene(uv + vec2(0.0, 1.0 * off.y)) * 0.15;
      s += sampleBrightScene(uv + vec2(0.0, 2.0 * off.y)) * 0.12;
      s += sampleBrightScene(uv + vec2(0.0, 3.0 * off.y)) * 0.09;
      s += sampleBrightScene(uv + vec2(0.0, 4.0 * off.y)) * 0.05;
      return s * 0.5;
    }

    vec3 dreamyBloom(vec2 uv) {
      float rSoft = 2.5 + u_dreamyGlow * 2.5;
      float rWide = 5.5 + u_dreamyGlow * 5.5;
      vec3 soft = blurCross9(uv, rSoft);
      vec3 wide = blurCross9(uv, rWide);
      vec3 blur = mix(soft, wide, 0.62);
      float luma = dot(blur, vec3(0.2126, 0.7152, 0.0722));
      float mask = smoothstep(0.03, 0.32, luma);
      return blur * mask;
    }

    float grainHash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
    }

    float analogGrain(vec2 p, float t) {
      float tw = mod(t, 64.0);
      float fine = grainHash(p * 1.25 + vec2(tw * 173.0, tw * 91.0)) - 0.5;
      float mid = grainHash(p * 0.58 + vec2(-tw * 67.0, tw * 53.0)) - 0.5;
      float coarse = grainHash(p * 0.18 + vec2(tw * 19.0, -tw * 23.0)) - 0.5;
      float weave = sin((p.y + tw * 24.0) * 0.42) * 0.5 + 0.5;
      return fine * 0.58 + mid * 0.27 + coarse * 0.15 + (weave - 0.5) * 0.08;
    }

    float staticGrain(vec2 p, float t) {
      float tw = mod(t, 64.0);
      vec2 cellA = floor(p * 1.0);
      vec2 cellB = floor(p * 1.9 + vec2(31.0, 17.0));
      vec2 cellC = floor(p * 3.4 + vec2(73.0, 91.0));
      float base = grainHash(cellA + vec2(11.0, 29.0)) - 0.5;
      float fine = grainHash(cellB + vec2(47.0, 13.0)) - 0.5;
      float micro = grainHash(cellC + vec2(19.0, 61.0)) - 0.5;
      float pulse = 0.92 + 0.08 * sin(tw * 17.0 + grainHash(cellA + 7.0) * 6.2831853);
      return (base * 0.5 + fine * 0.32 + micro * 0.18) * pulse;
    }

    float flickerGrain(vec2 p, float t) {
      float frame = mod(floor(t * 24.0), 512.0);
      vec2 px = floor(p);
      float a = grainHash(px + vec2(frame * 17.0 + 5.0, frame * 23.0 + 11.0)) - 0.5;
      float b = grainHash(px.yx + vec2(frame * 29.0 + 13.0, frame * 31.0 + 47.0)) - 0.5;
      float c = grainHash(floor(px * 0.5) + vec2(frame * 7.0 + 97.0, frame * 11.0 + 37.0)) - 0.5;
      return a * 0.76 + b * 0.18 + c * 0.06;
    }

    float filmGrainValue(vec2 p, float t) {
      if (u_grainMode < 0.5) return analogGrain(p, t);
      if (u_grainMode < 1.5) return staticGrain(p, t);
      return flickerGrain(p, t);
    }

    vec3 renderGhosts(vec2 uv, vec2 p, vec3 tint, float st) {
      if (u_ghostEnabled < 0.5 || u_ghostIntensity <= 0.001) return vec3(0.0);
      vec2 center = vec2(0.5, 0.5);
      vec2 axis = center - p;
      vec3 gcol = vec3(0.0);
      float countF = clamp(u_ghostCount, 1.0, 5.0);
      float spacing = clamp(u_ghostSpacing, 0.01, 0.5);
      float sizeBase = max(u_ghostSize, 0.05);
      float diffBase = max(u_ghostDiffusion, 0.05);
      float decay = clamp(u_ghostDecay, 0.0, 1.0);
      for (int gi = 0; gi < 5; gi++) {
        float idx = float(gi);
        if (idx >= countF) break;
        float t = (idx + 1.0) * spacing;
        vec2 gp = mix(p, center, t);
        vec2 d = uv - gp;
        // Décroissance robuste: évite les NaN/valeurs pathologiques à decay = 1.0
        float fall = mix(1.0, exp(-idx * 2.2), decay);
        float ghostSize = sizeBase * mix(1.0, 0.72, idx / 4.0);
        float ghostDiff = diffBase * mix(1.0, 1.15, idx / 4.0);
        vec2 rel = vec2(max(ghostSize * 0.018, 0.0015), max(ghostSize * 0.018 * ghostDiff, 0.0015));
        if (u_lensMode > 1.5) {
          float rr = length(d);
          float core = exp(-rr * (18.0 / max(ghostSize, 0.1)));
          float halo = exp(-rr * (6.5 / max(ghostSize * ghostDiff, 0.1))) * 0.35;
          gcol += tint * (core + halo) * st * u_ghostIntensity * fall;
        } else if (u_lensMode > 0.9) {
          float ghost = exp(-0.5 * pow(abs(d.x) / rel.x, 2.0)) * exp(-0.5 * pow(abs(d.y) / rel.y, 2.0));
          gcol += tint * ghost * st * u_ghostIntensity * 1.25 * fall;
        } else {
          float ghost = exp(-0.5 * pow(abs(d.y) / rel.x, 2.0)) * exp(-0.5 * pow(abs(d.x) / rel.y, 2.0));
          gcol += tint * ghost * st * u_ghostIntensity * 1.25 * fall;
        }
      }
      return gcol;
    }

    vec3 lensFlare(vec2 uv) {
      if (u_lensMode < 0.5) return vec3(0.0);

      vec2 p = u_flarePos;
      float st = u_flareStrength;
      if (st <= 0.001) return vec3(0.0);

      vec2 d = uv - p;
      float thicknessPx = max(u_lensThickness, 0.001);
      float sigmaCorePx = max(thicknessPx / 2.355, 0.5);
      float diffusionAmount = clamp(u_lensDiffusion / 5.0, 0.0, 1.0);
      float diffusionPx = max(u_lensDiffusion, 0.0) * 8.0;
      float sigmaSoftPx = max((thicknessPx + diffusionPx) / 2.355, sigmaCorePx + 0.25);
      float thicknessCoreUvX = sigmaCorePx / u_resolution.x;
      float thicknessCoreUvY = sigmaCorePx / u_resolution.y;
      float thicknessSoftUvX = sigmaSoftPx / u_resolution.x;
      float thicknessSoftUvY = sigmaSoftPx / u_resolution.y;

      float lengthFrac = clamp(u_lensLength, 0.01, 1.0);
      float axisScale = mix(1.0, 1.8, step(0.5, u_lensAnamorphic));
      float lenCoreX = max(lengthFrac * 0.5 * axisScale, 0.001);
      float lenCoreY = max(lengthFrac * 0.5 * axisScale, 0.001);
      float lenSoftX = lenCoreX;
      float lenSoftY = lenCoreY;

      vec3 tint = vec3(1.0, 0.98, 0.94);
      vec3 c = vec3(0.0);

      if (u_lensMode > 1.5) {
        float r = length(d);

        float starThicknessUvX = max(thicknessCoreUvX, 0.0005);
        float starThicknessUvY = max(thicknessCoreUvY, 0.0005);
        float starSoftUvX = max(thicknessSoftUvX, starThicknessUvX + 0.00025);
        float starSoftUvY = max(thicknessSoftUvY, starThicknessUvY + 0.00025);

        float starLenX = max(lenCoreX, 0.001);
        float starLenY = max(lenCoreY, 0.001);
        float starSoftLenX = max(lenSoftX * (1.0 + diffusionAmount * 0.35), starLenX);
        float starSoftLenY = max(lenSoftY * (1.0 + diffusionAmount * 0.35), starLenY);

        float horizCore = exp(-0.5 * pow(abs(d.y) / starThicknessUvY, 2.0)) * exp(-pow(abs(d.x) / starLenX, 1.10));
        float vertCore = exp(-0.5 * pow(abs(d.x) / starThicknessUvX, 2.0)) * exp(-pow(abs(d.y) / starLenY, 1.10));

        float horizSoft = exp(-0.5 * pow(abs(d.y) / starSoftUvY, 2.0)) * exp(-pow(abs(d.x) / starSoftLenX, 1.18));
        float vertSoft = exp(-0.5 * pow(abs(d.x) / starSoftUvX, 2.0)) * exp(-pow(abs(d.y) / starSoftLenY, 1.18));

        float starCore = horizCore + vertCore;
        float starSoft = horizSoft + vertSoft;
        float starProfile = mix(starCore, starSoft, diffusionAmount);

        float coreRadius = max((thicknessPx + diffusionPx * 0.6) / max(min(u_resolution.x, u_resolution.y), 1.0), 0.002);
        float core = exp(-pow(r / coreRadius, 1.55)) * (1.0 + diffusionAmount * 0.2);

        float haloRadius = max(coreRadius * (2.2 + diffusionAmount * 2.8), coreRadius + 0.001);
        float halo = exp(-pow(r / haloRadius, 1.35)) * mix(0.18, 0.42, diffusionAmount);

        c += tint * (core + halo + starProfile * 1.55) * st;
      } else if (u_lensMode > 0.9) {
        float coreThin = exp(-0.5 * pow(abs(d.x) / thicknessCoreUvX, 2.0));
        float coreLong = exp(-pow(abs(d.y) / lenCoreY, 1.08));
        float softThin = exp(-0.5 * pow(abs(d.x) / thicknessSoftUvX, 2.0));
        float softLong = exp(-pow(abs(d.y) / lenSoftY, 1.08));
        float coreLine = coreThin * coreLong;
        float softStreak = softThin * softLong;
        float dispersed = mix(coreLine, softStreak, diffusionAmount);
        float centerReduction = mix(1.0, 0.62, diffusionAmount);
        float profile = dispersed * centerReduction;
        c += tint * profile * st * 2.35;
      } else {
        float coreThin = exp(-0.5 * pow(abs(d.y) / thicknessCoreUvY, 2.0));
        float coreLong = exp(-pow(abs(d.x) / lenCoreX, 1.08));
        float softThin = exp(-0.5 * pow(abs(d.y) / thicknessSoftUvY, 2.0));
        float softLong = exp(-pow(abs(d.x) / lenSoftX, 1.08));
        float coreLine = coreThin * coreLong;
        float softStreak = softThin * softLong;
        float dispersed = mix(coreLine, softStreak, diffusionAmount);
        float centerReduction = mix(1.0, 0.62, diffusionAmount);
        float profile = dispersed * centerReduction;
        c += tint * profile * st * 2.35;
      }

      c += renderGhosts(uv, p, tint, st);
      return c;
    }

    void main() {
      vec2 uv = v_uv;
      vec2 px = 1.0 / u_resolution;
      bool hasChrom = (u_chromatic > 0.5);
      bool hasGlow = (u_glow > 0.001);
      bool hasDreamy = (u_dreamyGlow > 0.001);
      bool hasGrain = (u_filmGrain > 0.5 && u_grainAmount > 0.01);
      bool hasFlare = (u_lensMode > 0.5);

      vec3 preChromatic = sampleScene(uv);
      vec3 base;
      if (hasChrom) {
        if (u_chromaticMode < 0.5) {
          vec2 shift = px * (1.25 * u_chromaticOffset);
          base.r = sampleScene(uv + shift).r;
          base.g = preChromatic.g;
          base.b = sampleScene(uv - shift).b;
        } else {
          vec2 centered = uv - 0.5;
          vec2 rect = abs(centered) * 2.0;
          float edgeMetric = max(rect.x, rect.y);
          float edgeStart = clamp(1.0 - u_chromaticWidth, 0.0, 0.99);
          float edge = smoothstep(edgeStart, 1.0, edgeMetric);
          float dirLen = length(centered);
          vec2 dir = dirLen > 0.0001 ? centered / dirLen : vec2(0.0);
          vec2 shift = dir * px * (1.25 * u_chromaticOffset + edge * 5.0 * u_chromaticOffset) * edge;
          base.r = sampleScene(uv + shift).r;
          base.g = preChromatic.g;
          base.b = sampleScene(uv - shift).b;
        }
      } else {
        base = preChromatic;
      }

      if (!hasGlow && !hasDreamy && !hasGrain && !hasFlare && u_colorEnabled < 0.5) {
        gl_FragColor = vec4(base, 1.0);
        return;
      }

      vec3 combined = base;
      if (hasGlow) {
        vec3 glow;
        if (u_glowMode < 0.5) {
          glow = (
            sampleScene(uv + vec2(px.x, 0.0)) +
            sampleScene(uv - vec2(px.x, 0.0)) +
            sampleScene(uv + vec2(0.0, px.y)) +
            sampleScene(uv - vec2(0.0, px.y))
          ) * 0.25;
          combined += glow * u_glow * 0.6;
        } else if (u_glowMode < 1.5) {
          vec3 src = sampleScene(uv);
          float srcLum = dot(src, vec3(0.2126, 0.7152, 0.0722));
          float brightMask = smoothstep(0.10, 0.85, srcLum);

          vec3 glowNear = blurCross9(uv, 2.0);
          vec3 glowWide = blurCross9(uv, 5.0);
          glow = (glowNear * 0.7 + glowWide * 0.5) * brightMask;

          combined += glow * u_glow * 0.85;
        } else {
          vec3 glowNear = blurBrightCross9(uv, 2.0);
          vec3 glowWide = blurBrightCross9(uv, 5.0);
          glow = glowNear * 0.75 + glowWide * 0.55;
          combined += glow * u_glow * 0.95;
        }
      }
      if (hasDreamy) {
        vec3 dreamy = dreamyBloom(uv);
        vec2 centered = uv - 0.5;
        vec2 rect = abs(centered) * 2.0;
        float edgeMetric = max(rect.x, rect.y);
        // Amplification uniquement dans une bande proche des bords.
        // 0.0 au centre et jusqu'à 1.0 très près des bords.

        amp = 1.0;
      } else if (local < flareEvent.fadeIn + flareEvent.hold + flareEvent.fadeOut) {
        const u = clamp((local - flareEvent.fadeIn - flareEvent.hold) / Math.max(flareEvent.fadeOut, 0.0001), 0.0, 1.0);
        amp = 1.0 - smooth(u);
      }
      else {
        flareEvent.active = false;
        const minI = Math.min(+controls.flareMin.value, +controls.flareMax.value);
        const maxI = Math.max(+controls.flareMin.value, +controls.flareMax.value);
        flareEvent.nextAt = t + minI + Math.random() * (maxI - minI);
        amp = 0;
      }
      const a = flareEvent.anchor;
      const strength = Math.max(a.s, 0.65) * amp;
      flareState = { x: a.x, y: a.y, s: strength };
    } else {
      flareState = { x: 0.5, y: 0.5, s: 0 };
    }
  }

  function sampleFlowField(x, y) {
    const cols = flowField.cols, rows = flowField.rows, data = flowField.vectors;
    const fx = clamp((x * 0.5 + 0.5) * (cols - 1), 0, cols - 1);
    const fy = clamp((y * 0.5 + 0.5) * (rows - 1), 0, rows - 1);
    const x0 = Math.floor(fx), y0 = Math.floor(fy), x1 = Math.min(x0 + 1, cols - 1), y1 = Math.min(y0 + 1, rows - 1);
    const tx = fx - x0, ty = fy - y0;
    const i00 = (y0 * cols + x0) * 2, i10 = (y0 * cols + x1) * 2, i01 = (y1 * cols + x0) * 2, i11 = (y1 * cols + x1) * 2;
    const vx0 = data[i00] * (1 - tx) + data[i10] * tx;
    const vy0 = data[i00 + 1] * (1 - tx) + data[i10 + 1] * tx;
    const vx1 = data[i01] * (1 - tx) + data[i11] * tx;
    const vy1 = data[i01 + 1] * (1 - tx) + data[i11 + 1] * tx;
    return [vx0 * (1 - ty) + vx1 * ty, vy0 * (1 - ty) + vy1 * ty];
  }

  function shouldRespawn(p) {
    const dir = controls.flowDirection.value, m = 1.22;
    if (!true) return false;
    if (dir === 'horizontal') return p.x > m || p.y < -m || p.y > m;
    if (dir === 'vertical') return p.y > m || p.x < -m || p.x > m;
    if (dir === 'diagonal') return p.x > m || p.y > m || p.x < -m || p.y < -m;
    return p.x < -m || p.x > m || p.y < -m || p.y > m;
  }

  function computeRespawnFade(p) {
    if (!true) return 1;
    const fadeInSec = p.fadeInDur || (+controls.fadeIn.value / 1000);
    const fadeOutSec = p.fadeOutDur || (+controls.fadeOut.value / 1000);
    const fadeIn = clamp(p.life / fadeInSec, 0, 1);
    const mode = 'edge';
    if (mode === 'external' || mode === 'internal') {
      const exitFade = p.exiting ? (1 - clamp(p.exitLife / fadeOutSec, 0, 1)) : 1;
      return fadeIn * exitFade;
    }
    let exitFade = 1;
    const dir = controls.flowDirection.value;
    const fadeDist = 0.15 + (fadeOutSec * 0.25);
    if (dir === 'horizontal') exitFade = clamp((1.18 - p.x) / fadeDist, 0, 1);
    else if (dir === 'vertical') exitFade = clamp((1.18 - p.y) / fadeDist, 0, 1);
    else if (dir === 'diagonal') exitFade = clamp((1.18 - Math.max(p.x, p.y)) / fadeDist, 0, 1);
    else {
      const edgeDist = Math.min(p.x + 1.18, 1.18 - p.x, p.y + 1.18, 1.18 - p.y);
      exitFade = clamp(edgeDist / fadeDist, 0, 1);
    }
    return fadeIn * exitFade;
  }

  function update(dt, t) {
    const speed = particleSpeedFromSlider();
    const contained = "free" === 'contained';
    const pseudo3d = controls.pseudo3d.checked;
    flowFrameCounter++;
    if ((flowFrameCounter & 1) === 0) rebuildFlowField(t);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const depthFactor = pseudo3d ? (0.55 + p.z * 1.35) : 1.0;
      p.life += dt;

      if (true && 'edge' === 'internal' && !p.exiting && p.life >= p.internalExitAt) {
        p.exiting = true;
        p.exitLife = 0;
      }

      const flow = sampleFlowField(p.x, p.y);
      const targetVx = flow[0] * speed * depthFactor;
      const targetVy = flow[1] * speed * depthFactor;
      const response = 0.06 + speed * 0.08;
      p.vx += (targetVx - p.vx) * response;
      p.vy += (targetVy - p.vy) * response;
      p.vx *= 0.92;
      p.vy *= 0.92;
      p.x += p.vx * dt * 60.0;
      p.y += p.vy * dt * 60.0;

      if (contained) {
        if (p.x < -0.98 || p.x > 0.98) p.vx *= -0.8;
        if (p.y < -0.98 || p.y > 0.98) p.vy *= -0.8;
        p.x = clamp(p.x, -0.98, 0.98);
        p.y = clamp(p.y, -0.98, 0.98);
      } else if (shouldRespawn(p)) {
        if (true && 'edge' === 'external') {
          if (!p.exiting) {
            p.exiting = true;
            p.exitLife = 0;
          }
        } else {
          spawnParticleForRespawn(p, p.z);
        }
      } else if (!true) {
        const m = 1.25;
        if (p.x < -m) p.x = m;
        if (p.x > m) p.x = -m;
        if (p.y < -m) p.y = m;
        if (p.y > m) p.y = -m;
      }

      if (p.exiting) {
        p.exitLife += dt;
        if (p.exitLife >= (p.fadeOutDur || (+controls.fadeOut.value / 1000))) {
          spawnParticleForRespawn(p, p.z);
        }
      }

      p.fade = computeRespawnFade(p);
      p.bright = clamp((Math.abs(p.vx) + Math.abs(p.vy)) * 60.0 + (pseudo3d ? p.z * 0.25 : 0.1), 0, 1);
    }

    uploadParticles();
    updateFlareEvent(t);
  }

  function renderParticles() {
    gl.bindFramebuffer(gl.FRAMEBUFFER, state.sceneTex.fbo);
    gl.viewport(0, 0, state.width, state.height);
    gl.disable(gl.DEPTH_TEST);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(particleProgram);
    gl.bindBuffer(gl.ARRAY_BUFFER, particleBuffer);
    gl.enableVertexAttribArray(particleLocs.a_data);
    gl.vertexAttribPointer(particleLocs.a_data, 4, gl.FLOAT, false, 0, 0);
    gl.uniform2f(particleLocs.u_camera, 0.0, 0.0);
    gl.uniform1f(particleLocs.u_pseudo3d, controls.pseudo3d.checked ? 1 : 0);
    gl.uniform1f(particleLocs.u_glow, +controls.glow.value);
    gl.uniform1f(particleLocs.u_size, +controls.size.value);
    gl.uniform1f(particleLocs.u_dpr, state.dpr);
    gl.uniform1f(particleLocs.u_pseudo3dSize, controls.pseudo3dSize.checked ? 1.0 : 0.0);
    const particleShape =
      controls.particleShape.value === 'pixel' ? 1 :
      controls.particleShape.value === 'flowline' ? 2 :
      controls.particleShape.value === 'softsquare' ? 3 :
      controls.particleShape.value === 'core' ? 4 : 0;
    gl.uniform1f(particleLocs.u_particleShape, particleShape);
    gl.uniform3fv(particleLocs.u_accents, accentCache);
    gl.uniform1i(particleLocs.u_accentCount, accentCountCache);
    gl.uniform1f(particleLocs.u_colorEnabled, controls.colorEnabled.checked ? 1 : 0);
    gl.drawArrays(gl.POINTS, 0, particles.length);
    gl.disable(gl.BLEND);
  }

  let ping = true;
  let lastGrainModeKey = null;
  function renderPost(t) {
    const grainModeKey = `${controls.filmGrain.checked ? 1 : 0}:${controls.grainMode.value}`;
    if (grainModeKey !== lastGrainModeKey) {
      clearFbo(state.sceneA.fbo);
      clearFbo(state.sceneB.fbo);
      lastGrainModeKey = grainModeKey;
    }

    const out = ping ? state.sceneA : state.sceneB;
    const prev = ping ? state.sceneB : state.sceneA;
    ping = !ping;
    gl.bindFramebuffer(gl.FRAMEBUFFER, out.fbo);
    gl.viewport(0, 0, state.width, state.height);
    gl.useProgram(postProgram);
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
    gl.enableVertexAttribArray(postLocs.a_pos);
    gl.vertexAttribPointer(postLocs.a_pos, 2, gl.FLOAT, false, 0, 0);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, state.sceneTex.tex);
    gl.uniform1i(postLocs.u_scene, 0);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, prev.tex);
    gl.uniform1i(postLocs.u_prev, 1);
    gl.uniform2f(postLocs.u_resolution, state.width, state.height);
    gl.uniform1f(postLocs.u_time, t);
    gl.uniform1f(postLocs.u_glow, (controls.glowEnabled && controls.glowEnabled.checked) ? +controls.glow.value : 0.0);
    const glowMode =
      controls.glowMode.value === 'post' ? 1 :
      controls.glowMode.value === 'post2' ? 2 : 0;
    gl.uniform1f(postLocs.u_glowMode, glowMode);
    gl.uniform1f(postLocs.u_dreamyGlow, (controls.dreamyEnabled && controls.dreamyEnabled.checked) ? +controls.dreamyGlow.value : 0.0);
    gl.uniform1f(postLocs.u_dreamyEdgeBoost, +controls.dreamyEdgeBoost.value);
    gl.uniform1f(postLocs.u_filmGrain, controls.filmGrain.checked ? 1 : 0);
    const grainMode =
      controls.grainMode.value === 'static' ? 1 :
      controls.grainMode.value === 'celluloid' ? 2 :
      controls.grainMode.value === 'flicker' ? 3 : 0;
    gl.uniform1f(postLocs.u_grainMode, grainMode);
    gl.uniform1f(postLocs.u_grainAmount, +controls.grainAmount.value);
    gl.uniform1f(postLocs.u_glowGrainResponse, +controls.glowGrainResponse.value);
    gl.uniform1f(postLocs.u_dreamyGrainResponse, +controls.dreamyGrainResponse.value);
    gl.uniform1f(postLocs.u_lensFlareGrainResponse, +controls.lensFlareGrainResponse.value);
    gl.uniform1f(postLocs.u_chromatic, controls.chromatic.checked ? 1 : 0);
    gl.uniform1f(postLocs.u_chromaticMode, controls.chromaticMode.value === 'edges' ? 1 : 0);
    gl.uniform1f(postLocs.u_chromaticWidth, +controls.chromaticWidth.value);
    gl.uniform1f(postLocs.u_chromaticOffset, +controls.chromaticOffset.value);
    let lensMode = 0;
    if (controls.lensFlare.checked) {
      if (controls.lensFlareType.value === 'horizontal') lensMode = 0.6;
      else if (controls.lensFlareType.value === 'vertical') lensMode = 1.0;
      else lensMode = 2.0;
    }
    gl.uniform1f(postLocs.u_lensMode, lensMode);
    gl.uniform1f(postLocs.u_lensAnamorphic, controls.lensFlareAnamorphic.checked ? 1 : 0);
    gl.uniform1f(postLocs.u_lensThickness, +controls.flareThickness.value);
    gl.uniform1f(postLocs.u_lensLength, (+controls.flareLength.value) / 100);
    gl.uniform1f(postLocs.u_lensDiffusion, +controls.flareDiffusion.value);
    gl.uniform1f(postLocs.u_ghostEnabled, controls.ghostEnabled.checked ? 1 : 0);
    gl.uniform1f(postLocs.u_ghostIntensity, +controls.ghostIntensity.value);
    gl.uniform1f(postLocs.u_ghostCount, +controls.ghostCount.value);
    gl.uniform1f(postLocs.u_ghostSpacing, +controls.ghostSpacing.value);
    gl.uniform1f(postLocs.u_ghostSize, +controls.ghostSize.value);
    gl.uniform1f(postLocs.u_ghostDiffusion, +controls.ghostDiffusion.value);
    gl.uniform1f(postLocs.u_ghostDecay, +controls.ghostDecay.value);
    const f = flareState || { x: 0.5, y: 0.5, s: 0 };
    gl.uniform2f(postLocs.u_flarePos, f.x, f.y);
    gl.uniform1f(postLocs.u_flareStrength, f.s * 1.6);
    gl.uniform3fv(postLocs.u_accents, accentCache);
    gl.uniform1i(postLocs.u_accentCount, accentCountCache);
    gl.uniform1f(postLocs.u_colorEnabled, controls.colorEnabled.checked ? 1 : 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, state.width, state.height);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(blitProgram);
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
    gl.enableVertexAttribArray(blitLocs.a_pos);
    gl.vertexAttribPointer(blitLocs.a_pos, 2, gl.FLOAT, false, 0, 0);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, out.tex);
    gl.uniform1i(blitLocs.u_tex, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  function syncValues() {
    valueEls.particleCount.textContent = particleCountFromSlider().toLocaleString('fr-FR');    valueEls.speed.textContent = Math.round(particleSpeedDisplayPxPerSec()).toLocaleString('fr-FR') + ' px/s';
    valueEls.size.textContent = (+controls.size.value).toFixed(1) + ' px';
    valueEls.glow.textContent = (+controls.glow.value).toFixed(2);
    valueEls.dreamy.textContent = (+controls.dreamyGlow.value).toFixed(2);
    valueEls.dreamyEdgeBoost.textContent = (+controls.dreamyEdgeBoost.value).toFixed(2);
    valueEls.grainAmount.textContent = (+controls.grainAmount.value).toFixed(2);
    valueEls.chromaticWidth.textContent = (+controls.chromaticWidth.value).toFixed(2);
    valueEls.chromaticOffset.textContent = (+controls.chromaticOffset.value).toFixed(2);
    valueEls.flareDuration.textContent = controls.flareDuration.value + ' ms';
    valueEls.flareMin.textContent = (+controls.flareMin.value).toFixed(1);
    valueEls.flareMax.textContent = (+controls.flareMax.value).toFixed(1);
    valueEls.flareThickness.textContent = (+controls.flareThickness.value).toFixed(1) + ' px';
    valueEls.flareLength.textContent = Math.round(+controls.flareLength.value) + '%';
    valueEls.flareDiffusion.textContent = (+controls.flareDiffusion.value).toFixed(1) + 'x';
    valueEls.flareFadeIn.textContent = controls.flareFadeIn.value + '%';
    valueEls.flareHold.textContent = controls.flareHold.value + '%';
    valueEls.flareFadeOut.textContent = controls.flareFadeOut.value + '%';
    valueEls.flareEdgeDistance.textContent = Math.round(+controls.flareEdgeDistance.value) + ' px';
    valueEls.ghostIntensity.textContent = (+controls.ghostIntensity.value).toFixed(2);
    valueEls.ghostCount.textContent = Math.round(+controls.ghostCount.value);
    valueEls.ghostSpacing.textContent = (+controls.ghostSpacing.value).toFixed(2);
    valueEls.ghostSize.textContent = (+controls.ghostSize.value).toFixed(2);
    valueEls.ghostDiffusion.textContent = (+controls.ghostDiffusion.value).toFixed(2);
    valueEls.ghostDecay.textContent = (+controls.ghostDecay.value).toFixed(2);    if (valueEls.glowGrainResponse) valueEls.glowGrainResponse.textContent = (+controls.glowGrainResponse.value).toFixed(2);
    if (valueEls.dreamyGrainResponse) valueEls.dreamyGrainResponse.textContent = (+controls.dreamyGrainResponse.value).toFixed(2);
    if (valueEls.lensFlareGrainResponse) valueEls.lensFlareGrainResponse.textContent = (+controls.lensFlareGrainResponse.value).toFixed(2);
  }

  function on(el, event, handler) {
    if (el) el.addEventListener(event, handler);
  }

  ['particleCount', 'flowDirection', 'flowType', 'vortexCount', 'vortexStrengthMin', 'vortexStrengthMax', 'flowRespawn', 'fadeIn', 'fadeOut', 'fadeRandom'].forEach((k) => {
    on(controls[k], 'input', reseedParticles);
    on(controls[k], 'change', reseedParticles);
  });

  document.querySelectorAll('input,select').forEach((el) => on(el, 'input', syncValues));
  syncValues();

  function resetFlareTimer() {
    flareEvent.active = false;
    const now = performance.now() / 1000;
    const minI = Math.min(+controls.flareMin.value, +controls.flareMax.value);
    const maxI = Math.max(+controls.flareMin.value, +controls.flareMax.value);
    flareEvent.nextAt = now + minI + Math.random() * (maxI - minI);
  }

  controls.flareMin.addEventListener('input', resetFlareTimer);
  controls.flareMax.addEventListener('input', resetFlareTimer);

  let last = performance.now() / 1000;
  let fpsLastTime = performance.now();
  let fpsFrames = 0;
  let fpsDisplayed = -1;
  const fpsEl = document.getElementById('fps');

  function frame(nowMs) {
    fpsFrames++;
    if (nowMs - fpsLastTime >= 1000) {
      const fpsRounded = Math.round(fpsFrames * 1000 / (nowMs - fpsLastTime));
      if (fpsRounded !== fpsDisplayed) {
        fpsDisplayed = fpsRounded;
        fpsEl.textContent = fpsRounded + ' FPS';
      }
      fpsFrames = 0;
      fpsLastTime = nowMs;
    }
    resize();
    const now = nowMs / 1000;
    const dt = Math.min(now - last, 1 / 20);
    last = now;
    update(dt, now);
    renderParticles();
    renderPost(now);
    requestAnimationFrame(frame);
  }

  resize();
  window.addEventListener('resize', () => {
    resize();
    syncValues();
  });
  if (controls.fullscreenBtn) controls.fullscreenBtn.addEventListener('click', toggleFullscreen);
  document.addEventListener('fullscreenchange', () => {
    syncFullscreenButton();
    resize();
    syncValues();

    const wrap = document.getElementById('canvasWrap');

    if (document.fullscreenElement === wrap) {
      showCursor();
      wrap.addEventListener('mousemove', showCursor);
    } else {
      wrap.style.cursor = 'default';
      wrap.removeEventListener('mousemove', showCursor);
      if (cursorHideTimeout) clearTimeout(cursorHideTimeout);
    }
  });
  requestAnimationFrame(frame);
})();
</script>

</body>
