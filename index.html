<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jewels</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #050507; color: #ddd; font: 12px/1.35 system-ui, sans-serif; }
  #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; overflow: hidden; }
  #controls {
    overflow: auto;
    min-height: 0;
    padding: 12px;
    border-right: 1px solid rgba(255,255,255,.08);
    background: linear-gradient(180deg, rgba(18,18,24,.95), rgba(10,10,14,.95));
  }
  #controls h1 { margin: 0; font-size: 15px; }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spacer { flex: 1; }
  .fullscreen { width: 125px; }
  #fps { font-size: 12px; color: #8f9bb3; }
  .group { margin: 0 0 12px; padding: 10px; border: 1px solid rgba(255,255,255,.08); border-radius: 8px; }
  .group h2 { margin: 0 0 8px; font-size: 12px; font-weight: 700; }
  label { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; margin: 6px 0; }
  input[type="range"], select, button { width: 100%; }
  input[type="checkbox"] { justify-self: end; }
  .value { min-width: 50px; text-align: right; color: #aaa; }
  #colors .row { display: grid; grid-template-columns: 1fr 32px; gap: 6px; margin: 6px 0; }
  button { background: #181a22; color: #ddd; border: 1px solid rgba(255,255,255,.12); border-radius: 6px; padding: 7px 8px; cursor: pointer; }
  button:hover { background: #202434; }
  #canvasWrap { position: relative; min-width: 0; min-height: 0; overflow: hidden; }
  #canvasWrap:fullscreen { width: 100vw; height: 100vh; background: #050507; cursor: none; }
  #canvasWrap:fullscreen canvas { width: 100%; height: 100%; }
  canvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<script>
(() => {
  const canvas = document.getElementById('glcanvas');
  const gl = canvas.getContext('webgl', {
    antialias: true,
    premultipliedAlpha: false,
    preserveDrawingBuffer: false,
  });
  if (!gl) {
    document.body.innerHTML = '<div style="padding:20px">WebGL non disponible.</div>';
    return;
  }

  class AbstractModule {
    constructor(options = {}, controlIds = [], valueIds = []) {
      this.options = { ...options };
      this.controlIds = [...controlIds];
      this.valueIds = [...valueIds];
      this.root = null;
      this.controls = new Map();
      this.valueNodes = new Map();
      this.cleanupFns = [];
      this.gpu = {
        programs: new Map(),
        buffers: new Map(),
        textures: new Map(),
        framebuffers: new Map(),
      };
    }

    static deserialize(options = {}) {
      return new this(options);
    }

    serialize() {
      return {
        className: this.constructor.name,
        options: this.getParameters(),
      };
    }

    getParameters() {
      return { ...this.options };
    }

    setParameters(saved) {
      for (const id of this.controlIds) {
        const el = this.getControl(id);
        if (el) this._applyControlValue(el, saved[id]);
      }
      this.syncOptionsFromUI();
      this.syncValueDisplays();
    }

    _applyControlValue(el, value) {
      if (!el || value === undefined || value === null) return;
      if (el.type === 'checkbox') {
        if (typeof value === 'boolean') el.checked = value;
        else if (value === 'true' || value === 'false') el.checked = value === 'true';
        return;
      }
      if (el.tagName === 'SELECT') {
        const exists = [...el.options].some((opt) => opt.value === String(value));
        if (exists) el.value = String(value);
        return;
      }
      if (el.type === 'range') {
        const num = Number(value);
        const min = Number(el.min);
        const max = Number(el.max);
        if (!Number.isFinite(num)) return;
        if (Number.isFinite(min) && num < min) return;
        if (Number.isFinite(max) && num > max) return;
        el.value = String(num);
        return;
      }
      el.value = String(value);
    }

    setupGPU(runtime) {}

    resizeGPU(runtime) {}

    buildUI(node) {
      if (!node) {
        throw new Error(`${this.constructor.name}.buildUI(node): node is required`);
      }
      this.root = node;
      for (const id of this.controlIds) {
        const el = document.getElementById(id);
        if (el) this.controls.set(id, el);
      }
      for (const id of this.valueIds) {
        const el = document.getElementById(id);
        if (el) this.valueNodes.set(id, el);
      }
      this.onBuildUI(node);
      this.bindControlListeners();
      this.syncOptionsFromUI();
      this.syncValueDisplays();
    }

    onBuildUI(node) {}

    bindControlListeners() {
      for (const [id, el] of this.controls) {
        const handler = () => {
          this.options[id] = this.readControlValue(el);
          this.syncValueDisplays();
        };
        el.addEventListener('input', handler);
        el.addEventListener('change', handler);
        this.cleanupFns.push(() => {
          el.removeEventListener('input', handler);
          el.removeEventListener('change', handler);
        });
      }
    }

    readControlValue(el) {
      if (!el) return undefined;
      if (el.type === 'checkbox') return !!el.checked;
      if (el.type === 'range') return Number(el.value);
      return el.value;
    }

    getControl(id) {
      return this.controls.get(id) || null;
    }

    getValueNode(id) {
      return this.valueNodes.get(id) || null;
    }

    _setValueText(id, val) {
      const node = this.getValueNode(id);
      if (node) node.textContent = val;
    }

    syncOptionsFromUI() {
      for (const [id, el] of this.controls) {
        this.options[id] = this.readControlValue(el);
      }
    }

    syncValueDisplays() {}

    setup(runtime) {
      this.setupGPU(runtime);
    }

    resize(runtime) {

  class AbstractSubject extends AbstractModule {
    update(context) {
      throw new Error(`${this.constructor.name}.update(context) must be implemented`);
    }

    renderSubject(context) {
      throw new Error(`${this.constructor.name}.renderSubject(context) must be implemented`);
    }

    getDrawCount() {
      return 0;
    }

    renderScenePass(context = {}) {
      const time = context.time ?? 0;

      gl.bindFramebuffer(gl.FRAMEBUFFER, state.sceneTex.fbo);
      gl.viewport(0, 0, state.width, state.height);
      gl.disable(gl.DEPTH_TEST);
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(this.program);
      gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
      this.bindVertexAttributes();

      const renderContext = {
        ...context,
        time,
        gl,
        locs: this.locs,
      };
      this.renderSubject(renderContext);

      for (const effect of context.effects ?? []) {
        effect.applyScenePass(renderContext);
      }

      gl.drawArrays(gl.POINTS, 0, this.getDrawCount());
      gl.disable(gl.BLEND);
    }

    bindVertexAttributes() {}

    _resolveAllLocs(prog) {
      const locs = {};
      const uCount = gl.getProgramParameter(prog, gl.ACTIVE_UNIFORMS);
      for (let i = 0; i < uCount; i++) {
        const info = gl.getActiveUniform(prog, i);
        if (!info) continue;
        const name = info.name.endsWith('[0]') ? info.name.slice(0, -3) : info.name;
        locs[name] = gl.getUniformLocation(prog, name);
      }
      const aCount = gl.getProgramParameter(prog, gl.ACTIVE_ATTRIBUTES);
      for (let i = 0; i < aCount; i++) {
        const info = gl.getActiveAttrib(prog, i);
        if (!info) continue;
        locs[info.name] = gl.getAttribLocation(prog, info.name);
      }
      return locs;
    }
  }

        : 0.0;

  class EffectStack {
    constructor(effects, currentEffect) {
      this.effects = Array.isArray(effects) ? effects : [];
      this.currentEffect = currentEffect || null;
      this.currentIndex = this.effects.indexOf(this.currentEffect);
    }

    getAfter() {
      if (this.currentIndex < 0) return [];
      return this.effects.slice(this.currentIndex + 1);
    }

    hasEffectAfter(className) {
      return this.getAfter().some((effect) => effect?.constructor?.name === className);
    }
  }

  class ModuleHost {
    constructor({ subjects = [], effects = [] } = {}) {
      this.subjects = subjects;
      this.effects = effects;
    }

    getAllModules() {
      return [...this.subjects, ...this.effects];
    }

    getEffects() {
      return [...this.effects];
    }

    getSubjects() {
      return [...this.subjects];
    }

    findEffectByClassName(className) {
      return this.effects.find((effect) => effect.constructor.name === className) || null;
    }

    findControl(id) {
      for (const module of this.getAllModules()) {
        const el = module.getControl?.(id);
        if (el) return el;
      }
      return null;
    }

    findValueNode(id) {
      for (const module of this.getAllModules()) {
        const el = module.getValueNode?.(id);
        if (el) return el;
      }
      return null;
    }

    buildAllUI(groupFinder) {
      const mappings = [
        ...this.subjects.map((s) => [s, s.constructor.uiTitle || s.constructor.name]),
        ...this.effects.map((e) => [e, e.constructor.uiTitle || e.constructor.name]),
      ];

      for (const [module, title] of mappings) {
        if (!module) continue;
        const node = groupFinder(title);
        if (!node) continue;
        module.buildUI(node);
      }
    }

    syncAllModuleValueDisplays() {
      for (const module of this.getAllModules()) {
        module.syncOptionsFromUI?.();
        module.syncValueDisplays?.();
      }
    }
  
    captureSettings() {
      const settings = {};
      for (const module of this.getAllModules()) {
        settings[module.constructor.name] = module.getParameters();
      }
      return settings;
    }

    applySettings(settings) {
      if (!settings || typeof settings !== 'object') return;
      for (const module of this.getAllModules()) {
        const saved = settings[module.constructor.name];
        if (!saved || typeof saved !== 'object') continue;
        module.setParameters(saved);
      }
    }

    bindPersistenceListeners(handler) {
      for (const module of this.getAllModules()) {
        for (const id of module.controlIds || []) {
          const el = module.getControl(id);
          if (!el) continue;
          el.addEventListener('input', handler);
          el.addEventListener('change', handler);
        }
      }
    }

    updateSubjects(contextFactory) {
      for (const subject of this.subjects) {
        subject.update?.(contextFactory({}));
      }
    }

    renderSubjects(contextFactory) {
      for (const subject of this.subjects) {
        subject.renderScenePass(contextFactory({}));
      }
    }

    transformEffects(contextFactory) {
      const effects = this.effects;
      for (const effect of effects) {
        effect.transform(contextFactory({
          effectStack: new EffectStack(effects, effect),
        }));
      }
    }

    setupAllModules(contextFactory) {
      for (const module of this.getAllModules()) {
        module.setup(contextFactory({}));
      }
    }

    resizeAllModules(contextFactory) {
      for (const module of this.getAllModules()) {
        module.resize(contextFactory({}));
      }
    }
  }

  class PipelineRuntime {
    constructor(stateRef, configRef) {
      this.state = stateRef;

    }

      return {
        gl,
        ...extra,
      };
    }

    buildPassContext(extra = {}) {
      return this.getContext(extra);
    }

    clearFrameHistory() {
      this.state.frameHistory.length = 0;
    }

    resetPostChain() {
      this.postPingIndex = 0;
      if (this.state.sceneA?.fbo) clearFbo(this.state.sceneA.fbo);
      if (this.state.sceneB?.fbo) clearFbo(this.state.sceneB.fbo);
    }

    pushFrameHistory(texture) {
      this.state.frameHistory.unshift({
        texture,
        width: Math.max(1, Math.floor(this.state.width * this.config.frameHistoryScale)),
        height: Math.max(1, Math.floor(this.state.height * this.config.frameHistoryScale)),
      });
      if (this.state.frameHistory.length > this.config.frameHistoryLimit) {
        this.state.frameHistory.length = this.config.frameHistoryLimit;
      }
    }

    getSceneTarget() {
      return this.state.sceneTex;
    }

    getPreviousFrameTexture(fallbackTexture = null) {
      return this.state.frameHistory[0]?.texture || fallbackTexture;
    }

    getNextPostTarget() {
      const out = this.postPingIndex === 0 ? this.state.sceneA : this.state.sceneB;
      this.postPingIndex = this.postPingIndex === 0 ? 1 : 0;
      return out;
    }

    bindPostBuffer(out, time) {
      gl.bindFramebuffer(gl.FRAMEBUFFER, out.fbo);
      gl.viewport(0, 0, this.state.width, this.state.height);
      gl.useProgram(postProgram);
      gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
      gl.enableVertexAttribArray(postLocs.a_pos);
      gl.vertexAttribPointer(postLocs.a_pos, 2, gl.FLOAT, false, 0, 0);
      gl.uniform2f(postLocs.u_resolution, this.state.width, this.state.height);
      gl.uniform1f(postLocs.u_time, time);
    }

    bindPostInputs(sceneTexture, previousTexture) {
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, sceneTexture);
      gl.uniform1i(postLocs.u_scene, 0);

      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, previousTexture);
      gl.uniform1i(postLocs.u_prev, 1);
    }

    blitToScreen(texture) {
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, this.state.width, this.state.height);
      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(blitProgram);
      gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
      gl.enableVertexAttribArray(blitLocs.a_pos);
      gl.vertexAttribPointer(blitLocs.a_pos, 2, gl.FLOAT, false, 0, 0);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.uniform1i(blitLocs.u_tex, 0);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }

    resizeTargets(width, height, dpr) {
      this.state.width = width;
      this.state.height = height;
      this.state.dpr = dpr;
      canvas.width = width;
      canvas.height = height;
      gl.viewport(0, 0, width, height);
      this.state.sceneTex = createTexFbo(width, height);
      this.state.sceneA = createTexFbo(width, height);
      this.state.sceneB = createTexFbo(width, height);
      clearFbo(this.state.sceneA.fbo);
      clearFbo(this.state.sceneB.fbo);
      clearFbo(this.state.sceneTex.fbo);
      this.clearFrameHistory();
      this.postPingIndex = 0;
    }
  }

    float alpha = clamp(mask + halo * 0.6, 0.0, 1.0) * v_alpha;

  }
  `;

      const dir = this.getFlowDirection();
      const nA = this.fieldNoise(x, y, t);
      const nB = this.fieldNoise(x + flowRadius, y, t);
      const nC = this.fieldNoise(x - flowRadius, y, t);
      const nD = this.fieldNoise(x, y + flowRadius, t);
      const nE = this.fieldNoise(x, y - flowRadius, t);
      const noise = [
        (nA[0] + nB[0] + nC[0] + nD[0] + nE[0]) / 5,
        (nA[1] + nB[1] + nC[1] + nD[1] + nE[1]) / 5,
      ];
      const useImperfections = this.useSurfaceImperfections();
      if (dir === 'horizontal' || dir === 'horizontal-rev' || dir === 'vertical' || dir === 'vertical-rev') {
        const perpX = -bd[1], perpY = bd[0];
        const noiseAlong = noise[0] * bd[0] + noise[1] * bd[1];
        const noisePerp = noise[0] * perpX + noise[1] * perpY;
        const imperf = useImperfections ? this.imperfectionField(x, y) : 0.0;
        vx += bd[0] * 0.018 + bd[0] * noiseAlong * 0.003 + perpX * (noisePerp * 0.006 + imperf);
        vy += bd[1] * 0.018 + bd[1] * noiseAlong * 0.003 + perpY * (noisePerp * 0.006 + imperf);
      } else {
        vx += bd[0] * 0.0045;
        vy += bd[1] * 0.0045;
        const vA = this.fieldVortex(x, y, t);
        const vB = this.fieldVortex(x + flowRadius, y, t);
        const vC = this.fieldVortex(x - flowRadius, y, t);
        const vD = this.fieldVortex(x, y + flowRadius, t);
        const vE = this.fieldVortex(x, y - flowRadius, t);
        const vortex = [
          (vA[0] + vB[0] + vC[0] + vD[0] + vE[0]) / 5,
          (vA[1] + vB[1] + vC[1] + vD[1] + vE[1]) / 5,
        ];
        const imperf = useImperfections ? this.imperfectionField(x, y) : 0.0;
        vx += noise[0] * 0.0045 + vortex[0] * 0.9 + imperf;
        vy += noise[1] * 0.0045 + vortex[1] * 0.9 + imperf;
      }
      return [vx, vy];
    }
    rebuildFlowField(t) {
      const cols = this.flowField.cols;
      const rows = this.flowField.rows;
      const data = this.flowField.vectors;
      let ptr = 0;
      for (let gy = 0; gy < rows; gy++) {
        const y = -1.0 + (gy / (rows - 1)) * 2.0;
        for (let gx = 0; gx < cols; gx++) {
          const x = -1.0 + (gx / (cols - 1)) * 2.0;
          const flow = this.computeFlowRaw(x, y, t);
          const drift = this.fieldNoise(x + 5.0, y - 3.0, t * 0.9 + 17.0);
          data[ptr++] = flow[0] + drift[0] * 0.00008;
          data[ptr++] = flow[1] + drift[1] * 0.00008;
        }
      }
    }
    sampleFlowField(x, y) {
      const cols = this.flowField.cols;
      const rows = this.flowField.rows;
      const data = this.flowField.vectors;
      const fx = clamp((x * 0.5 + 0.5) * (cols - 1), 0, cols - 1);
      const fy = clamp((y * 0.5 + 0.5) * (rows - 1), 0, rows - 1);
      const x0 = Math.floor(fx);
      const y0 = Math.floor(fy);
      const x1 = Math.min(x0 + 1, cols - 1);
      const y1 = Math.min(y0 + 1, rows - 1);
      const tx = fx - x0;
      const ty = fy - y0;
      const i00 = (y0 * cols + x0) * 2;
      const i10 = (y0 * cols + x1) * 2;
      const i01 = (y1 * cols + x0) * 2;
      const i11 = (y1 * cols + x1) * 2;
      const vx0 = data[i00] * (1 - tx) + data[i10] * tx;
      const vy0 = data[i00 + 1] * (1 - tx) + data[i10 + 1] * tx;
      const vx1 = data[i01] * (1 - tx) + data[i11] * tx;
      const vy1 = data[i01 + 1] * (1 - tx) + data[i11 + 1] * tx;
      return [vx0 * (1 - ty) + vx1 * ty, vy0 * (1 - ty) + vy1 * ty];
    }
    shouldRespawn(p) {
      const dir = this.getFlowDirection(), m = 1.22;
      if (dir === 'horizontal') return p.x > m || p.y < -m || p.y > m;
      if (dir === 'horizontal-rev') return p.x < -m || p.y < -m || p.y > m;
      if (dir === 'vertical') return p.y > m || p.x < -m || p.x > m;
      if (dir === 'vertical-rev') return p.y < -m || p.x < -m || p.x > m;
      return p.x < -m || p.x > m || p.y < -m || p.y > m;
    }
    computeRespawnFade(p) {
      const fadeInSec = p.fadeInDur || 3.0;
      const fadeOutSec = p.fadeOutDur || 1.9;
      const fadeIn = clamp(p.life / fadeInSec, 0, 1);
      let exitFade = 1;
      const dir = this.getFlowDirection();
      const fadeDist = 0.15 + (fadeOutSec * 0.25);
      if (dir === 'horizontal') exitFade = clamp((1.18 - p.x) / fadeDist, 0, 1);
      else if (dir === 'horizontal-rev') exitFade = clamp((1.18 + p.x) / fadeDist, 0, 1);
      else if (dir === 'vertical') exitFade = clamp((1.18 - p.y) / fadeDist, 0, 1);
      else if (dir === 'vertical-rev') exitFade = clamp((1.18 + p.y) / fadeDist, 0, 1);
      else {
        const edgeDist = Math.min(p.x + 1.18, 1.18 - p.x, p.y + 1.18, 1.18 - p.y);
        exitFade = clamp(edgeDist / fadeDist, 0, 1);
      }
      return fadeIn * exitFade;
    }
    particleBrightness(p, speed) {
      const motion = Math.min(1.0, Math.hypot(p.vx, p.vy) / Math.max(speed, 0.0001));
      const depth = 0.45 + p.z * 0.75;
      return clamp((0.35 + motion * 0.65) * p.fade * depth, 0, 1);
    }
    syncValueDisplays() {
      this._setValueText('particleCountVal', this.getParticleCountFromSlider().toLocaleString('fr-FR'));
      const speedPx = Math.round(this.getParticleSpeedDisplayPxPerSec()).toLocaleString('fr-FR');
      this._setValueText('speedVal', speedPx + ' px/s');
      this._setValueText('sizeVal', (+this.getControl('size').value).toFixed(1) + ' px');
    }
    reseedParticles() {
      const count = this.getParticleCountFromSlider();
      this.particles = new Array(count);
      this.particleData = new Float32Array(count * 4);
      this.bufferInitialized = false;
      this.initFlowSeeds();
      this.flowOffset = [rand(0, 100), rand(0, 100)];
      this.initImperfectionSeeds();
      this.rebuildFlowField(0);
      for (let i = 0; i < count; i++) {
        const p = {
          x: 0, y: 0, vx: 0, vy: 0, z: Math.random(), bright: 0,
          life: 0, fade: 1, fadeInDur: 0, fadeOutDur: 0,
        };
        this.spawnParticleForRespawn(p, Math.random(), true);
        this.particles[i] = p;
      }
      this.uploadParticles();
    }
    uploadParticles() {
      for (let i = 0; i < this.particles.length; i++) {
        const p = this.particles[i];
        const j = i * 4;
        this.particleData[j] = p.x;
        this.particleData[j + 1] = p.y;
        this.particleData[j + 2] = p.z;
        this.particleData[j + 3] = p.fade;
      }
      gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
      if (!this.bufferInitialized) {
        gl.bufferData(gl.ARRAY_BUFFER, this.particleData, gl.DYNAMIC_DRAW);
        this.bufferInitialized = true;
      } else {
        gl.bufferSubData(gl.ARRAY_BUFFER, 0, this.particleData);
      }
    }
    update({
      deltaTime, time
    } = {
    }) {
      const dt = deltaTime ?? 0;
      const t = time ?? 0;
      const speed = this.getParticleSpeedFromSlider();
      this.flowFrameCounter++;
      if ((this.flowFrameCounter & 1) === 0) this.rebuildFlowField(t);
      if (this.useSurfaceImperfections()) this.updateImperfectionSeeds(dt);
      for (let i = 0; i < this.particles.length; i++) {
        const p = this.particles[i];
        const depthFactor = 0.55 + p.z * 1.35;
        p.life += dt;
        const flow = this.sampleFlowField(p.x, p.y);
        let targetVx = flow[0] * speed * depthFactor;
        let targetVy = flow[1] * speed * depthFactor;
        const dir = this.getFlowDirection();
        if (dir === 'horizontal' || dir === 'horizontal-rev') {
          const edgeProximity = Math.max(0, (Math.abs(p.y) - 0.6) / 0.4);
          targetVy *= 1.0 - edgeProximity * edgeProximity;
        } else if (dir === 'vertical' || dir === 'vertical-rev') {
          const edgeProximity = Math.max(0, (Math.abs(p.x) - 0.6) / 0.4);
          targetVx *= 1.0 - edgeProximity * edgeProximity;
        }
        const response = 0.06 + speed * 0.08;
        p.vx += (targetVx - p.vx) * response;
        p.vy += (targetVy - p.vy) * response;
        p.vx *= 0.92;
        p.vy *= 0.92;
        p.x += p.vx * dt * 60.0;
        p.y += p.vy * dt * 60.0;
        if (this.shouldRespawn(p)) {
          this.spawnParticleForRespawn(p);
        }
        p.fade = this.computeRespawnFade(p);
        p.bright = this.particleBrightness(p, speed);
      }
      this.uploadParticles();
    }
    renderSubject({ gl, locs, time, dpr }) {
      gl.uniform2f(locs.u_camera, 0.0, 0.0);
      gl.uniform1f(locs.u_size, +this.getControl('size').value);
      gl.uniform1f(locs.u_dpr, dpr ?? state.dpr);
      const shapeValue = this.getControl('particleShape').value;
      const particleShape = shapeValue === 'pixel' ? 1
        : shapeValue === 'flowline' ? 2
        : shapeValue === 'softsquare' ? 3
        : shapeValue === 'core' ? 4
        : shapeValue === 'glitter' ? 5 : 0;
      gl.uniform1f(locs.u_particleShape, particleShape);
      gl.uniform1f(locs.u_time, time);
    }
  }

  class GlowEffect extends EffectInterface {
    static uiTitle = 'Glow';
    constructor(options = {}) {
      super(options,
        ['glowEnabled', 'glow', 'glowGrainResponse', 'glowMode'],
        ['glowVal', 'glowGrainResponseVal']
      );
    }
    syncValueDisplays() {
      const glowVal = this.getControl('glowEnabled').checked ? +this.getControl('glow').value : 0.0;
      this._setValueText('glowVal', glowVal.toFixed(2));
      this._setValueText('glowGrainResponseVal', (+this.getControl('glowGrainResponse').value).toFixed(2));
    }

    getRebuildKey(context = {}) {
      const hasGrainAfter = context.effectStack?.hasEffectAfter('GrainEffect') || false;
      return `glow:${hasGrainAfter ? 'grain' : 'nograin'}`;
    }

    transform({ gl, locs }) {
      const mode = this.getControl('glowMode').value;
      const glowMode = mode === 'post' ? 1 : mode === 'post2' ? 2 : 0;
      const glowVal = this.getControl('glowEnabled').checked ? +this.getControl('glow').value : 0.0;
      gl.uniform1f(locs.u_glow, glowVal);
      gl.uniform1f(locs.u_glowMode, glowMode);
      gl.uniform1f(locs.u_glowGrainResponse, +this.getControl('glowGrainResponse').value);
    }

    getPostShaderUniforms(context = {}) {
      const hasGrainAfter = context.effectStack?.hasEffectAfter('GrainEffect') || false;
      let s = `
  uniform float u_glow;
  uniform float u_glowMode;`;
      if (hasGrainAfter) {
        s += `
  uniform float u_glowGrainResponse;`;
      }
      return s;
    }

    getPostShaderGuards() {
      return `
    bool hasGlow = (u_glow > 0.001);`;
    }

    getPostShaderGuardSymbol() {
      return 'hasGlow';
    }

    getPostShaderPreCode(context = {}) {
      const hasGrainAfter = context.effectStack?.hasEffectAfter('GrainEffect') || false;
      const grainMaskCode = `
      float glowLum = dot(glow, vec3(0.2126, 0.7152, 0.0722));
      float glowMask = smoothstep(0.02, 0.35, glowLum);
      grainResponseMask *= mix(1.0, clamp(u_glowGrainResponse, 0.0, 1.0), glowMask);`;

      return `
    if (hasGlow) {
      vec3 glow;
      if (u_glowMode < 0.5) {
        glow = (
      sampleScene(uv + vec2(px.x, 0.0)) +
      sampleScene(uv - vec2(px.x, 0.0)) +
      sampleScene(uv + vec2(0.0, px.y)) +
      sampleScene(uv - vec2(0.0, px.y))
    ) * 0.25;
        combined += glow * u_glow * 0.6;
      }
      else if (u_glowMode < 1.5) {
        vec3 src = sampleScene(uv);
        float srcLum = dot(src, vec3(0.2126, 0.7152, 0.0722));
        float brightMask = smoothstep(0.10, 0.85, srcLum);
        vec3 glowNear = blurCross9(uv, 2.0);
        vec3 glowWide = blurCross9(uv, 5.0);
        glow = (glowNear * 0.7 + glowWide * 0.5) * brightMask;
        combined += glow * u_glow * 0.85;
      }
      else {
        vec3 glowNear = blurBrightCross9(uv, 2.0);
        vec3 glowWide = blurBrightCross9(uv, 5.0);
        glow = glowNear * 0.75 + glowWide * 0.55;
        combined += glow * u_glow * 0.95;
      }${hasGrainAfter ? grainMaskCode : ''}
    }`;
    }
  }

  class DreamyGlowEffect extends EffectInterface {
    static uiTitle = 'Dreamy Glow';

    constructor(options = {}) {
      super(options,
        ['dreamyEnabled', 'dreamyGlow', 'dreamyGrainResponse', 'dreamyEdgeBoost'],
        ['dreamyVal', 'dreamyGrainResponseVal', 'dreamyEdgeBoostVal']
      );
    }

    syncValueDisplays() {
      this._setValueText('dreamyVal', (+this.getControl('dreamyGlow').value).toFixed(2));
      this._setValueText('dreamyGrainResponseVal',
        (+this.getControl('dreamyGrainResponse').value).toFixed(2));
      this._setValueText('dreamyEdgeBoostVal', (+this.getControl('dreamyEdgeBoost').value).toFixed(2));
    }

    getRebuildKey(context = {}) {
      const hasGrainAfter = context.effectStack?.hasEffectAfter('GrainEffect') || false;
      return `dreamy:${hasGrainAfter ? 'grain' : 'nograin'}`;
    }

    transform({ gl, locs }) {
      this.uniformEnabled(locs, 'u_dreamyGlow', 'dreamyEnabled', 'dreamyGlow');
      gl.uniform1f(locs.u_dreamyEdgeBoost, +this.getControl('dreamyEdgeBoost').value);
      gl.uniform1f(locs.u_dreamyGrainResponse, +this.getControl('dreamyGrainResponse').value);
    }

    getPostShaderUniforms(context = {}) {
      const hasGrainAfter = context.effectStack?.hasEffectAfter('GrainEffect') || false;
      let s = `
  uniform float u_dreamyGlow;
  uniform float u_dreamyEdgeBoost;`;
      if (hasGrainAfter) {
        s += `
  uniform float u_dreamyGrainResponse;`;
      }
      return s;
    }

    getPostShaderGuards() {
      return `
    bool hasDreamy = (u_dreamyGlow > 0.001);`;
    }

    getPostShaderGuardSymbol() {
      return 'hasDreamy';
    }

    getPostShaderHelpers() {
      return `
  vec3 dreamyBloom(vec2 uv) {
    float rSoft = 2.5 + u_dreamyGlow * 2.5;
    float rWide = 5.5 + u_dreamyGlow * 5.5;
    vec3 soft = blurCross9(uv, rSoft);
    vec3 wide = blurCross9(uv, rWide);
    vec3 blur = mix(soft, wide, 0.62);
    float luma = dot(blur, vec3(0.2126, 0.7152, 0.0722));
    float mask = smoothstep(0.03, 0.32, luma);
    return blur * mask;
  }`;
    }

    getPostShaderPreCode(context = {}) {
      const hasGrainAfter = context.effectStack?.hasEffectAfter('GrainEffect') || false;
      const grainMaskCode = `
      float dreamyLum = dot(dreamy * (0.35 + u_dreamyGlow * 0.85) * edgeBoost, vec3(0.2126, 0.7152, 0.0722));
      float dreamyMask = smoothstep(0.02, 0.35, dreamyLum);
      grainResponseMask *= mix(1.0, clamp(u_dreamyGrainResponse, 0.0, 1.0), dreamyMask);`;

      return `
    if (hasDreamy) {
      vec3 dreamy = dreamyBloom(uv);
      vec2 centered = uv - 0.5;
      vec2 rect = abs(centered) * 2.0;
      float edgeMetric = max(rect.x, rect.y);
      float edgeMask = smoothstep(0.92, 0.995, edgeMetric);
      float edgeBoost = 1.0 + edgeMask * u_dreamyEdgeBoost;
      combined += dreamy * (0.35 + u_dreamyGlow * 0.85) * edgeBoost;${hasGrainAfter ? grainMaskCode : ''}
    }`;
    }
  }

  class ColorTintEffect extends EffectInterface {
    static uiTitle = 'Couleurs';

    constructor(options = {}) {
      super(options, ['colorEnabled'], []);
      this.colorList = null;
      this.addButton = null;
      this.defaultColors = ['#5900ff', '#00d5ff'];
      this.accentCache = new Float32Array(24);
      this.accentCountCache = 0;
    }

    onBuildUI(node) {
      const existingCheckbox = node.querySelector('#colorEnabled');
      if (existingCheckbox) {
        this.controls.set('colorEnabled', existingCheckbox);
      } else {
        const label = document.createElement('label');
        const input = document.createElement('input');
        input.id = 'colorEnabled';
        input.type = 'checkbox';
        input.checked = this.options.colorEnabled !== false;
        label.append(input, document.createTextNode(' Activer'));
        node.insertBefore(label, node.firstChild);
        this.controls.set('colorEnabled', input);
      }

      this.colorList = node.querySelector('#colors');
      if (!this.colorList) {
        this.colorList = document.createElement('div');
        this.colorList.id = 'colors';
        node.appendChild(this.colorList);
      }

      this.addButton = node.querySelector('#addColor');
      if (!this.addButton) {
        this.addButton = document.createElement('button');
        this.addButton.id = 'addColor';
        this.addButton.type = 'button';
        this.addButton.textContent = 'Ajouter une couleur';
        node.appendChild(this.addButton);
      }

      const initialColors = Array.isArray(this.options.colors) && this.options.colors.length
        ? this.options.colors
        : this.defaultColors;

      this.colorList.innerHTML = '';
      initialColors.slice(0, 8).forEach((hex) => this.addColor(hex));

      const onListInput = () => {
        this.options.colors = this.getColors();
        this.rebuildAccentCache();
      };

      const onAdd = () => {
        this.addColor('#ffffff');
        this.options.colors = this.getColors();
        this.rebuildAccentCache();
      };

      this.colorList.addEventListener('input', onListInput);
      this.colorList.addEventListener('change', onListInput);
      this.addButton.addEventListener('click', onAdd);

      this.cleanupFns.push(() => {
        this.colorList.removeEventListener('input', onListInput);
        this.colorList.removeEventListener('change', onListInput);
        this.addButton.removeEventListener('click', onAdd);
      });

      this.options.colors = this.getColors();
      this.rebuildAccentCache();
    }

    addColor(hex = '#ffffff') {
      const row = document.createElement('div');
      row.className = 'row';

      const input = document.createElement('input');
      input.type = 'color';
      input.value = hex;

      const del = document.createElement('button');
      del.type = 'button';
      del.textContent = '×';
      del.addEventListener('click', () => {
        row.remove();
        this.options.colors = this.getColors();
        this.rebuildAccentCache();
      });

      row.append(input, del);
      this.colorList.appendChild(row);
    }

    getColors() {
      if (!this.colorList) {
        return Array.isArray(this.options.colors) ? this.options.colors : this.defaultColors;
      }
      return [...this.colorList.querySelectorAll('input[type="color"]')]
        .map((input) => input.value);
    }

    rebuildAccentCache() {
      const rgbFromHex = (hex) => {
        const n = parseInt(hex.slice(1), 16);
        return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
      };

      const colors = this.getColors().slice(0, 8);
      this.accentCountCache = colors.length;

      for (let i = 0; i < 8; i++) {
        const o = i * 3;
        if (i < colors.length) {
          const rgb = rgbFromHex(colors[i]);
          this.accentCache[o] = rgb[0];
          this.accentCache[o + 1] = rgb[1];
          this.accentCache[o + 2] = rgb[2];
        } else {
          this.accentCache[o] = 0;
          this.accentCache[o + 1] = 0;
          this.accentCache[o + 2] = 0;
        }
      }
    }

    setParameters(saved) {
      super.setParameters(saved);
      if (!Array.isArray(saved.colors) || !saved.colors.length) return;
      if (!this.colorList) return;
      const valid = saved.colors
        .filter((c) => typeof c === 'string' && /^#[0-9a-fA-F]{6}$/.test(c))
        .slice(0, 8);
      if (!valid.length) return;
      this.colorList.innerHTML = '';
      valid.forEach((hex) => this.addColor(hex));
      this.options.colors = this.getColors();
      this.rebuildAccentCache();
    }

    getParameters() {
      return {
        ...super.getParameters(),
        colorEnabled: !!this.getControl('colorEnabled')?.checked,
        colors: this.getColors(),
      };
    }

    onSettingsChanged(t) {
      this.rebuildAccentCache();
    }

    applyScenePass({ gl, locs }) {
      if (locs.u_accents !== undefined)
        gl.uniform3fv(locs.u_accents, this.accentCache);
      if (locs.u_accentCount !== undefined)
        gl.uniform1i(locs.u_accentCount, this.accentCountCache);
      if (locs.u_colorEnabled !== undefined)
        gl.uniform1f(locs.u_colorEnabled, this.getControl('colorEnabled').checked ? 1.0 : 0.0);
    }

    transform({ gl, locs }) {
      const control = this.getControl('colorEnabled');
      if (locs.u_accents !== undefined) gl.uniform3fv(locs.u_accents, this.accentCache);
      if (locs.u_accentCount !== undefined) gl.uniform1i(locs.u_accentCount, this.accentCountCache);
      if (locs.u_colorEnabled !== undefined)
        gl.uniform1f(locs.u_colorEnabled, control && control.checked ? 1.0 : 0.0);
    }

    getPostShaderUniforms() {
      return `
  uniform float u_colorEnabled;
  uniform vec3 u_accents[8];
  uniform int u_accentCount;`;
    }

    getPostShaderPreCode() {
      return `
    if (u_colorEnabled > 0.5 && u_accentCount > 0) {
      vec3 tint = paletteColor(clamp(uv.x, 0.0, 1.0));
      combined = mix(combined, combined * tint, 0.28);
    }`;
    }
  }

  class GrainEffect extends EffectInterface {
    static uiTitle = 'Grain';

    constructor(options = {}) {
      super(options, ['filmGrain', 'grainMode', 'grainAmount'], ['grainAmountVal']);
    }

    syncValueDisplays() {
      this._setValueText('grainAmountVal', (+this.getControl('grainAmount').value).toFixed(2));
    }

    transform({ gl, locs }) {
      const modeValue = this.getControl('grainMode').value;
      const grainMode = modeValue === 'static' ? 1 : modeValue === 'celluloid' ? 2 : 0;
      gl.uniform1f(locs.u_filmGrain, this.getControl('filmGrain').checked ? 1.0 : 0.0);
      gl.uniform1f(locs.u_grainMode, grainMode);
      gl.uniform1f(locs.u_grainAmount, +this.getControl('grainAmount').value);
    }

    getPostShaderUniforms() {
      return `
  uniform float u_filmGrain;
  uniform float u_grainMode;
  uniform float u_grainAmount;`;
    }

    getPostShaderGuards() {
      return `
    bool hasGrain = (u_filmGrain > 0.5 && u_grainAmount > 0.01);`;
    }

    getPostShaderGuardSymbol() {
      return 'hasGrain';
    }

    getRebuildKey(context = {}) {
      return 'grain';
    }

    getPostShaderHelpers() {
      return `
  float grainHash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
  }

  float analogGrain(vec2 p, float t) {
    float tw = mod(t, 64.0);
    float fine   = grainHash(p * 1.25 + vec2(tw * 173.0,  tw * 91.0)) - 0.5;
    float mid    = grainHash(p * 0.58 + vec2(-tw * 67.0,  tw * 53.0)) - 0.5;
    float coarse = grainHash(p * 0.18 + vec2( tw * 19.0, -tw * 23.0)) - 0.5;
    float weave  = sin((p.y + tw * 24.0) * 0.42) * 0.5 + 0.5;
    return fine * 0.58 + mid * 0.27 + coarse * 0.15 + (weave - 0.5) * 0.08;
  }

  float staticGrain(vec2 p, float t) {
    float tw = mod(t, 64.0);
    vec2 cellA = floor(p * 1.0);
    vec2 cellB = floor(p * 1.9 + vec2(31.0, 17.0));
    vec2 cellC = floor(p * 3.4 + vec2(73.0, 91.0));
    float base  = grainHash(cellA + vec2(11.0, 29.0)) - 0.5;
    float fine  = grainHash(cellB + vec2(47.0, 13.0)) - 0.5;
    float micro = grainHash(cellC + vec2(19.0, 61.0)) - 0.5;
    float pulse = 0.92 + 0.08 * sin(tw * 17.0 + grainHash(cellA + 7.0) * 6.2831853);
    return (base * 0.5 + fine * 0.32 + micro * 0.18) * pulse;
  }

  float scanGrain(vec2 p, float t) {
    float frame = mod(floor(t * 24.0), 512.0);
    vec2 px = floor(p);
    vec2 ta = fract(frame * vec2(17.0 / 512.0, 23.0 / 512.0));
    vec2 tb = fract(frame * vec2(29.0 / 512.0, 31.0 / 512.0));
    vec2 tc = fract(frame * vec2( 7.0 / 512.0, 11.0 / 512.0));
    float a = grainHash(px / 256.0 + ta) - 0.5;
    float b = grainHash(px.yx / 256.0 + tb) - 0.5;
    float c = grainHash(floor(px * 0.5) / 256.0 + tc) - 0.5;
    return a * 0.76 + b * 0.18 + c * 0.06;
  }

  float filmGrainValue(vec2 p, float t) {
    if (u_grainMode < 0.5) return analogGrain(p, t);
    if (u_grainMode < 1.5) return staticGrain(p, t);
    return scanGrain(p, t);
  }`;
    }

    getPostShaderPostCode() {
      return `
    if (hasGrain) {
      vec2 gp = gl_FragCoord.xy;
      float lum = dot(combined, vec3(0.2126, 0.7152, 0.0722));
      float grain = filmGrainValue(gp, u_time);
      float mask = 0.35 + smoothstep(0.015, 0.45, lum) * 0.95;
      mask *= grainResponseMask;
      combined = clamp(combined + vec3(grain) * (0.10 * u_grainAmount) * mask, 0.0, 1.0);
    }`;
    }
  }

  class ChromaticAberrationEffect extends EffectInterface {
    static uiTitle = 'Aberration chromatique';

    constructor(options = {}) {
      super(options,
        ['chromatic', 'chromaticMode', 'chromaticWidth', 'chromaticOffset'],
        ['chromaticWidthVal', 'chromaticOffsetVal']
      );
    }

    getRebuildKey(context = {}) {
      return 'chromatic';
    }

    syncValueDisplays() {
      this._setValueText('chromaticWidthVal', (+this.getControl('chromaticWidth').value).toFixed(2));
      this._setValueText('chromaticOffsetVal', (+this.getControl('chromaticOffset').value).toFixed(2));
    }

    transform({ gl, locs }) {
      gl.uniform1f(locs.u_chromatic, this.getControl('chromatic').checked ? 1.0 : 0.0);
      gl.uniform1f(locs.u_chromaticMode, this.getControl('chromaticMode').value === 'edges' ? 1.0 : 0.0);
      gl.uniform1f(locs.u_chromaticWidth, +this.getControl('chromaticWidth').value);
      gl.uniform1f(locs.u_chromaticOffset, +this.getControl('chromaticOffset').value);
    }

    getPostShaderUniforms() {
      return `
  uniform float u_chromatic;
  uniform float u_chromaticMode;
  uniform float u_chromaticWidth;
  uniform float u_chromaticOffset;`;
    }

    getPostShaderGuards() {
      return `
    bool hasChrom = (u_chromatic > 0.5);`;
    }

    getPostShaderGuardSymbol() {
      return 'hasChrom';
    }

    getPostShaderHelpers() {
      return `
  vec3 applyChromaticAberration(vec2 uv, vec2 px) {
    vec3 preChromatic = sampleScene(uv);
    vec3 chromatic;
    if (u_chromaticMode < 0.5) {
      vec2 shift = px * (1.25 * u_chromaticOffset);
      chromatic.r = sampleScene(uv + shift).r;
      chromatic.g = preChromatic.g;
      chromatic.b = sampleScene(uv - shift).b;
    } else {
      vec2 centered = uv - 0.5;
      vec2 rect = abs(centered) * 2.0;
      float edgeMetric = max(rect.x, rect.y);
      float edgeStart = clamp(1.0 - u_chromaticWidth, 0.0, 0.99);
      float edge = smoothstep(edgeStart, 1.0, edgeMetric);
      float dirLen = length(centered);
      vec2 dir = dirLen > 0.0001 ? centered / dirLen : vec2(0.0);
      vec2 shift = dir * px * (1.25 * u_chromaticOffset + edge * 5.0 * u_chromaticOffset) * edge;
      chromatic.r = sampleScene(uv + shift).r;
      chromatic.g = preChromatic.g;
      chromatic.b = sampleScene(uv - shift).b;
    }
    return chromatic;
  }`;
    }

    getPostShaderPreCode() {
      return `
    if (hasChrom) {
      combined = applyChromaticAberration(uv, px);
    }`;
    }
  }

  class LensFlareEffect extends EffectInterface {
    static uiTitle = 'Lens flare';
    constructor(options = {}) {
      super(options,
        [
          'lensFlare', 'lensFlareGrainResponse', 'lensFlareType', 'lensFlareAnamorphic',
          'flareThickness', 'flareLength', 'flareDiffusion', 'flareDuration',
          'flareMin', 'flareMax', 'flareFadeIn', 'flareHold', 'flareFadeOut',
          'flareEdgeDistance', 'ghostEnabled', 'ghostIntensity', 'ghostCount',
          'ghostSpacing', 'ghostSize', 'ghostDiffusion', 'ghostDecay',
        ],
        [
          'lensFlareGrainResponseVal', 'flareDurationVal', 'flareMinVal', 'flareMaxVal',
          'flareThicknessVal', 'flareLengthVal', 'flareDiffusionVal', 'flareFadeInVal',
          'flareHoldVal', 'flareFadeOutVal', 'flareEdgeDistanceVal', 'ghostIntensityVal',
          'ghostCountVal', 'ghostSpacingVal', 'ghostSizeVal', 'ghostDiffusionVal',
          'ghostDecayVal',
        ]
      );
      this.flareState = { x: 0.5, y: 0.5, s: 0 };
      this.flareEvent = {
        active: false,
        nextAt: Infinity,
        startAt: 0,
        fadeIn: 0,
        hold: 0,
        fadeOut: 0,
        anchor: { x: 0.5, y: 0.5, s: 0 },
      };
      this.scheduleNextFlare(0);
    }

    syncValueDisplays() {
      this._setValueText('lensFlareGrainResponseVal',
        (+this.getControl('lensFlareGrainResponse').value).toFixed(2));
      this._setValueText('flareDurationVal', this.getControl('flareDuration').value + ' ms');
      this._setValueText('flareMinVal', (+this.getControl('flareMin').value).toFixed(1));
      this._setValueText('flareMaxVal', (+this.getControl('flareMax').value).toFixed(1));
      this._setValueText('flareThicknessVal', (+this.getControl('flareThickness').value).toFixed(1) + ' px');
      this._setValueText('flareLengthVal', Math.round(+this.getControl('flareLength').value) + '%');
      this._setValueText('flareDiffusionVal', (+this.getControl('flareDiffusion').value).toFixed(1) + 'x');
      this._setValueText('flareFadeInVal', this.getControl('flareFadeIn').value + '%');
      this._setValueText('flareHoldVal', this.getControl('flareHold').value + '%');
      this._setValueText('flareFadeOutVal', this.getControl('flareFadeOut').value + '%');
      this._setValueText('flareEdgeDistanceVal',
        Math.round(+this.getControl('flareEdgeDistance').value) + ' px');
      this._setValueText('ghostIntensityVal', (+this.getControl('ghostIntensity').value).toFixed(2));
      this._setValueText('ghostCountVal', Math.round(+this.getControl('ghostCount').value));
      this._setValueText('ghostSpacingVal', (+this.getControl('ghostSpacing').value).toFixed(2));
      this._setValueText('ghostSizeVal', (+this.getControl('ghostSize').value).toFixed(2));
      this._setValueText('ghostDiffusionVal', (+this.getControl('ghostDiffusion').value).toFixed(2));
      this._setValueText('ghostDecayVal', (+this.getControl('ghostDecay').value).toFixed(2));
    }

    onSettingsChanged(t) {
      this.scheduleNextFlare(t);
    }

    findEdgeClusterAnchor(useLeftEdge, context = {}) {
      const subject = (context.moduleHost ?? moduleHost).getSubjects()[0];
      const particles = subject?.particles || [];
      const w = Math.max((context.state ?? state).width, 1);
      const h = Math.max((context.state ?? state).height, 1);
      const edgeDistanceUv = (+this.getControl('flareEdgeDistance').value) / w;
      const jitterPx = 50.0;
      const jitterUvX = jitterPx / w;
      const jitterUvY = jitterPx / h;
      const targetX = useLeftEdge ? edgeDistanceUv : 1.0 - edgeDistanceUv;
      const bandPx = 140.0;
      const bandUv = bandPx / w;
      const bins = 18;
      const scores = new Float32Array(bins);
      const weightedY = new Float32Array(bins);
      let bestBright = null;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const px = p.x * 0.5 + 0.5;
        const py = p.y * 0.5 + 0.5;
        const dx = Math.abs(px - targetX);
        if (dx > bandUv) continue;
        const edgeWeight = 1.0 - clamp(dx / Math.max(bandUv, 0.0001), 0.0, 1.0);
        const score = (0.25 + p.bright * 0.75) * edgeWeight * (0.2 + p.fade * 0.8);
        const bin = Math.max(0, Math.min(bins - 1, Math.floor(py * bins)));
        scores[bin] += score;
        weightedY[bin] += py * score;
        if (!bestBright || score > bestBright.score) {
          bestBright = { x: px, y: py, score, bright: p.bright };
        }
      }
      let bestBin = -1;
      let bestScore = 0;
      for (let i = 0; i < bins; i++) {
        const neighborhood = scores[i]
          + (i > 0 ? scores[i - 1] * 0.55 : 0)
          + (i < bins - 1 ? scores[i + 1] * 0.55 : 0);
        if (neighborhood > bestScore) { bestScore = neighborhood; bestBin = i; }
      }
      let y = 0.5;
      let strength = 0.65;
      if (bestBin >= 0 && bestScore > 0.0001) {
        const localScore = scores[bestBin];
        if (localScore > 0.0001) y = weightedY[bestBin] / localScore;
        else y = (bestBin + 0.5) / bins;
        strength = clamp(0.45 + bestScore * 0.6, 0.45, 1.0);
      } else if (bestBright) {
        y = bestBright.y;
        strength = clamp(0.45 + bestBright.bright * 0.7, 0.45, 1.0);
      }
      const x = clamp(targetX + (Math.random() - 0.5) * 2.0 * jitterUvX, 0.0, 1.0);
      y = clamp(y + (Math.random() - 0.5) * 2.0 * jitterUvY, 0.02, 0.98);
      return { x, y, s: strength };
    }

    scheduleNextFlare(t) {
      const enabled = this.getControl('lensFlare')?.checked;
      if (!enabled) {
        this.flareEvent.active = false;
        this.flareEvent.nextAt = Infinity;
        this.flareState = { x: 0.5, y: 0.5, s: 0 };
        return;
      }
      const rawMin = +this.getControl('flareMin').value;
      const rawMax = +this.getControl('flareMax').value;
      const minI = Math.min(rawMin, rawMax);
      const maxI = Math.max(rawMin, rawMax);
      this.flareEvent.active = false;
      this.flareEvent.nextAt = t + minI + Math.random() * (maxI - minI);
      this.flareState = { x: 0.5, y: 0.5, s: 0 };
    }

    update({ time, moduleHost: mh, state: st } = {}) {
      const t = time ?? 0;
      if (!this.getControl('lensFlare').checked) {
        this.flareEvent.active = false;
        this.flareEvent.nextAt = Infinity;
        this.flareState = { x: 0.5, y: 0.5, s: 0 };
        return;
      }
      if (!this.flareEvent.active && t >= this.flareEvent.nextAt) {
        this.flareEvent.active = true;
        const useLeftEdge = Math.random() < 0.5;
        this.flareEvent.anchor = this.findEdgeClusterAnchor(useLeftEdge, { moduleHost: mh, state: st });
        this.flareEvent.startAt = t;
        const totalDuration = (+this.getControl('flareDuration').value) / 1000.0;
        const fi = +this.getControl('flareFadeIn').value;
        const ho = +this.getControl('flareHold').value;
        const fo = +this.getControl('flareFadeOut').value;
        const sum = Math.max(fi + ho + fo, 0.0001);
        this.flareEvent.fadeIn = totalDuration * (fi / sum);
        this.flareEvent.hold = totalDuration * (ho / sum);
        this.flareEvent.fadeOut = totalDuration * (fo / sum);
      }
      if (this.flareEvent.active) {
        const local = t - this.flareEvent.startAt;
        let amp = 0;
        if (local < this.flareEvent.fadeIn) {
          const u = clamp(local / Math.max(this.flareEvent.fadeIn, 0.0001), 0.0, 1.0);
          amp = smooth(u);
        } else if (local < this.flareEvent.fadeIn + this.flareEvent.hold) {
          amp = 1.0;
        } else if (local < this.flareEvent.fadeIn + this.flareEvent.hold + this.flareEvent.fadeOut) {
          const elapsed = local - this.flareEvent.fadeIn - this.flareEvent.hold;
          const u = clamp(elapsed / Math.max(this.flareEvent.fadeOut, 0.0001), 0.0, 1.0);
          amp = 1.0 - smooth(u);
        } else {
          this.flareEvent.active = false;
          const rawMin = +this.getControl('flareMin').value;
          const rawMax = +this.getControl('flareMax').value;
          const minI = Math.min(rawMin, rawMax);
          const maxI = Math.max(rawMin, rawMax);
          this.flareEvent.nextAt = t + minI + Math.random() * (maxI - minI);
          amp = 0;
        }
        const a = this.flareEvent.anchor;
        const strength = Math.max(a.s, 0.65) * amp;
        this.flareState = { x: a.x, y: a.y, s: strength };
      } else {
        this.flareState = { x: 0.5, y: 0.5, s: 0 };
      }
    }

    getRebuildKey(context = {}) {
      const hasGrainAfter = context.effectStack?.hasEffectAfter('GrainEffect') || false;
      return `lensflare:${hasGrainAfter ? 'grain' : 'nograin'}`;
    }

    transform({ gl, locs, effectStack }) {
      const typeMap = { horizontal: 0.6, vertical: 1.0, star: 2.0 };
      const lensMode = this.getControl('lensFlare').checked
        ? (typeMap[this.getControl('lensFlareType').value] || 1.0)
        : 0.0;
      gl.uniform1f(locs.u_lensMode, lensMode);
      const lensAnamorphic = this.getControl('lensFlareAnamorphic').checked ? 1.0 : 0.0;
      gl.uniform1f(locs.u_lensAnamorphic, lensAnamorphic);
      gl.uniform1f(locs.u_lensThickness, +this.getControl('flareThickness').value);
      gl.uniform1f(locs.u_lensLength, (+this.getControl('flareLength').value) / 100.0);
      gl.uniform1f(locs.u_lensDiffusion, +this.getControl('flareDiffusion').value);
      gl.uniform1f(locs.u_ghostEnabled, this.getControl('ghostEnabled').checked ? 1.0 : 0.0);
      gl.uniform1f(locs.u_ghostIntensity, +this.getControl('ghostIntensity').value);
      gl.uniform1f(locs.u_ghostCount, +this.getControl('ghostCount').value);
      gl.uniform1f(locs.u_ghostSpacing, +this.getControl('ghostSpacing').value);
      gl.uniform1f(locs.u_ghostSize, +this.getControl('ghostSize').value);
      gl.uniform1f(locs.u_ghostDiffusion, +this.getControl('ghostDiffusion').value);
      gl.uniform1f(locs.u_ghostDecay, +this.getControl('ghostDecay').value);
      gl.uniform2f(locs.u_flarePos, this.flareState.x, this.flareState.y);
      gl.uniform1f(locs.u_flareStrength, this.flareState.s * 1.6);
      const hasGrainAfter = effectStack?.hasEffectAfter('GrainEffect') || false;
      if (hasGrainAfter) {
        gl.uniform1f(locs.u_lensFlareGrainResponse, +this.getControl('lensFlareGrainResponse').value);
      }
    }

    getPostShaderUniforms(context = {}) {
      const hasGrainAfter = context.effectStack?.hasEffectAfter('GrainEffect') || false;
      let s = `
  uniform float u_lensMode;
  uniform float u_lensAnamorphic;
  uniform float u_lensThickness;
  uniform float u_lensLength;
  uniform float u_lensDiffusion;
  uniform float u_ghostEnabled;
  uniform float u_ghostIntensity;
  uniform float u_ghostCount;
  uniform float u_ghostSpacing;
  uniform float u_ghostSize;
  uniform float u_ghostDiffusion;
  uniform float u_ghostDecay;
  uniform vec2 u_flarePos;
  uniform float u_flareStrength;`;
      if (hasGrainAfter) {
        s += `
  uniform float u_lensFlareGrainResponse;`;
      }
      return s;
    }

    getPostShaderGuards() {
      return `
    bool hasFlare = (u_lensMode > 0.5);`;
    }

    getPostShaderGuardSymbol() {
      return 'hasFlare';
    }

    getPostShaderHelpers(context = {}) {
      const hasGrainAfter = context.effectStack?.hasEffectAfter('GrainEffect') || false;
      const grainHelperCode = hasGrainAfter ? `
  float lensFlareLuma(vec3 lensFlareColor) {
    return dot(lensFlareColor, vec3(0.2126, 0.7152, 0.0722));
  }

  float lensFlareGrainMask(vec2 uv) {
    if (u_lensMode < 0.5) return 1.0;
    float flareLum = lensFlareLuma(lensFlare(uv));
    float flareMask = smoothstep(0.02, 0.55, flareLum);
    return mix(1.0, clamp(u_lensFlareGrainResponse, 0.0, 1.0), flareMask);
  }` : '';

      return `
  vec3 lensFlare(vec2 uv) {
    if (u_lensMode < 0.5) return vec3(0.0);
    vec2 p = u_flarePos;
    float st = u_flareStrength;
    if (st <= 0.001) return vec3(0.0);
    vec2 d = uv - p;
    float thicknessPx = max(u_lensThickness, 0.001);
    float sigmaCorePx = max(thicknessPx / 2.355, 0.5);
    float diffusionAmount = clamp(u_lensDiffusion / 5.0, 0.0, 1.0);
    float diffusionPx = max(u_lensDiffusion, 0.0) * 8.0;
    float sigmaSoftPx = max((thicknessPx + diffusionPx) / 2.355, sigmaCorePx + 0.25);
    float thicknessCoreUvX = sigmaCorePx / u_resolution.x;
    float thicknessCoreUvY = sigmaCorePx / u_resolution.y;
    float thicknessSoftUvX = sigmaSoftPx / u_resolution.x;
    float thicknessSoftUvY = sigmaSoftPx / u_resolution.y;
    float lengthFrac = clamp(u_lensLength, 0.01, 1.0);
    float axisScale = mix(1.0, 1.8, step(0.5, u_lensAnamorphic));
    float lenCoreX = max(lengthFrac * 0.5 * axisScale, 0.001);
    float lenCoreY = max(lengthFrac * 0.5 * axisScale, 0.001);
    float lenSoftX = lenCoreX;
    float lenSoftY = lenCoreY;
    vec3 tint = vec3(1.0, 0.98, 0.94);
    vec3 c = vec3(0.0);
    if (u_lensMode > 1.5) {
      float r = length(d);
      float starThicknessUvX = max(thicknessCoreUvX, 0.0005);
      float starThicknessUvY = max(thicknessCoreUvY, 0.0005);
      float starSoftUvX = max(thicknessSoftUvX, starThicknessUvX + 0.00025);
      float starSoftUvY = max(thicknessSoftUvY, starThicknessUvY + 0.00025);
      float starLenX = max(lenCoreX, 0.001);
      float starLenY = max(lenCoreY, 0.001);
      float starSoftLenX = max(lenSoftX * (1.0 + diffusionAmount * 0.35), starLenX);
      float starSoftLenY = max(lenSoftY * (1.0 + diffusionAmount * 0.35), starLenY);
      float horizCore = exp(-0.5 * pow(abs(d.y) / starThicknessUvY, 2.0)) * exp(-pow(abs(d.x) / starLenX, 1.10));
      float vertCore = exp(-0.5 * pow(abs(d.x) / starThicknessUvX, 2.0)) * exp(-pow(abs(d.y) / starLenY, 1.10));
      float horizSoft = exp(-0.5 * pow(abs(d.y) / starSoftUvY, 2.0)) * exp(-pow(abs(d.x) / starSoftLenX, 1.18));
      float vertSoft = exp(-0.5 * pow(abs(d.x) / starSoftUvX, 2.0)) * exp(-pow(abs(d.y) / starSoftLenY, 1.18));
      float starCore = horizCore + vertCore;
      float starSoft = horizSoft + vertSoft;
      float starProfile = mix(starCore, starSoft, diffusionAmount);
      float coreRadius = max((thicknessPx + diffusionPx * 0.6) / max(min(u_resolution.x, u_resolution.y), 1.0), 0.002);
      float core = exp(-pow(r / coreRadius, 1.55)) * (1.0 + diffusionAmount * 0.2);
      float haloRadius = max(coreRadius * (2.2 + diffusionAmount * 2.8), coreRadius + 0.001);
      float halo = exp(-pow(r / haloRadius, 1.35)) * mix(0.18, 0.42, diffusionAmount);
      c += tint * (core + halo + starProfile * 1.55) * st;
    } else if (u_lensMode > 0.9) {
      float coreThin = exp(-0.5 * pow(abs(d.x) / thicknessCoreUvX, 2.0));
      float coreLong = exp(-pow(abs(d.y) / lenCoreY, 1.08));
      float softThin = exp(-0.5 * pow(abs(d.x) / thicknessSoftUvX, 2.0));
      float softLong = exp(-pow(abs(d.y) / lenSoftY, 1.08));
      float coreLine = coreThin * coreLong;
      float softStreak = softThin * softLong;
      float dispersed = mix(coreLine, softStreak, diffusionAmount);
      float centerReduction = mix(1.0, 0.62, diffusionAmount);
      float profile = dispersed * centerReduction;
      c += tint * profile * st * 2.35;
    } else {
      float coreThin = exp(-0.5 * pow(abs(d.y) / thicknessCoreUvY, 2.0));
      float coreLong = exp(-pow(abs(d.x) / lenCoreX, 1.08));
      float softThin = exp(-0.5 * pow(abs(d.y) / thicknessSoftUvY, 2.0));
      float softLong = exp(-pow(abs(d.x) / lenSoftX, 1.08));
      float coreLine = coreThin * coreLong;
      float softStreak = softThin * softLong;
      float dispersed = mix(coreLine, softStreak, diffusionAmount);
      float centerReduction = mix(1.0, 0.62, diffusionAmount);
      float profile = dispersed * centerReduction;
      c += tint * profile * st * 2.35;
    }
    if (u_ghostEnabled > 0.5 && u_ghostIntensity > 0.001) {
      vec2 center = vec2(0.5, 0.5);
      float countF    = clamp(u_ghostCount,   1.0, 5.0);
      float spacing   = clamp(u_ghostSpacing, 0.01, 0.5);
      float sizeBase  = max(u_ghostSize,      0.05);
      float diffBase  = max(u_ghostDiffusion, 0.05);
      float decay     = clamp(u_ghostDecay,   0.0, 1.0);
      for (int gi = 0; gi < 5; gi++) {
        float idx = float(gi);
        if (idx >= countF) break;
        float t = (idx + 1.0) * spacing;
        vec2 gp = mix(p, center, t);
        vec2 d2 = uv - gp;
        float fall = mix(1.0, exp(-idx * 2.2), decay);
        float ghostSize = max(sizeBase / min(u_resolution.x, u_resolution.y), 0.0001);
        float ghostDiff = max(diffBase, 0.05);
        float ghostR = length(d2);
        float ghost = exp(-pow(ghostR / (ghostSize + 0.0001), 1.55));

  class BlockGlitch2Effect extends EffectInterface {
    static uiTitle = 'Block Glitch 2';

    constructor(options = {}) {
      super(options,

        ['bg2Val', 'bg2SpeedVal', 'bg2ScaleVal']
      );

      this._setValueText('bg2SpeedVal', (+this.getControl('bg2Speed').value).toFixed(2));
      const bg2v = Math.max(+this.getControl('bg2Scale').value, 0.001);
      const bg2Px = Math.round(1920 / 14 / (6 + (1 / bg2v) * 10));
      this._setValueText('bg2ScaleVal', bg2Px + ' px');
    }

    transform({ gl, locs }) {
      this.uniformEnabled(locs, 'u_bg2', 'bg2Enabled', 'bg2');
      gl.uniform1f(locs.u_bg2Speed, +this.getControl('bg2Speed').value);
      gl.uniform1f(locs.u_bg2Scale, 1.0 / Math.max(+this.getControl('bg2Scale').value, 0.001));

      return `
  uniform float u_bg2;
  uniform float u_bg2Speed;
  uniform float u_bg2Scale;`;
    }

    getPostShaderGuards() {
      return `
    bool hasBg2 = (u_bg2 > 0.001);`;
    }

    getPostShaderGuardSymbol() {
      return 'hasBg2';
    }

    getPostShaderHelpers() {
      return `
  vec3 applyBlockGlitch2(vec3 color, vec2 uv, float time) {
    float t = floor(time * (2.0 + u_bg2Speed * 3.0));
    float scale = 6.0 + u_bg2Scale * 10.0;
    vec2 grid = vec2(14.0, 8.0) * scale;
    vec2 cell = floor(uv * grid);
    float gate = smoothstep(0.78, 0.995, noise21(cell + vec2(t, 7.0)));
    vec2 offs = vec2(
      (noise21(cell + vec2(17.0, t * 0.71)) - 0.5) * 0.28,
      (noise21(cell + vec2(47.0, t * 0.53)) - 0.5) * 0.10
    ) * u_bg2;
    vec3 block = sampleScene(clamp((cell + 0.5) / grid + offs, 0.0, 1.0));
    block = mix(block, block.bgr, smoothstep(0.55, 0.95, noise21(cell + vec2(91.0, t))));
    return mix(color, block, clamp(gate * u_bg2 * 0.5, 0.0, 1.0));
  }`;
    }

    getPostShaderPostCode() {
      return `
    if (hasBg2) {
      combined = applyBlockGlitch2(combined, uv, u_time);
    }`;
    }

  class CRTEffect extends EffectInterface {
    static uiTitle = 'Écran CRT';

    constructor(options = {}) {
      super(options,
        ['crtEnabled', 'crt', 'crtScanlines', 'crtScanlinesSize', 'crtFlicker', 'crtVignette', 'crtPhosphore'],
        ['crtVal', 'crtScanlinesVal', 'crtScanlinesSizeVal', 'crtFlickerVal', 'crtVignetteVal', 'crtPhosphoreVal']
      );
    }

    syncValueDisplays() {
      this._setValueText('crtVal', (+this.getControl('crt').value).toFixed(2));
      this._setValueText('crtScanlinesVal', (+this.getControl('crtScanlines').value).toFixed(2));
      this._setValueText('crtScanlinesSizeVal', (+this.getControl('crtScanlinesSize').value).toFixed(1));
      this._setValueText('crtFlickerVal', (+this.getControl('crtFlicker').value).toFixed(2));
      this._setValueText('crtVignetteVal', (+this.getControl('crtVignette').value).toFixed(4));
      this._setValueText('crtPhosphoreVal', (+this.getControl('crtPhosphore').value).toFixed(2));
    }

    transform({ gl, locs }) {
      this.uniformEnabled(locs, 'u_crt', 'crtEnabled', 'crt');
      gl.uniform1f(locs.u_crtScanlines, +this.getControl('crtScanlines').value);
      gl.uniform1f(locs.u_crtScanlinesSize, +this.getControl('crtScanlinesSize').value);
      gl.uniform1f(locs.u_crtFlicker, +this.getControl('crtFlicker').value);
      gl.uniform1f(locs.u_crtVignette, +this.getControl('crtVignette').value);
      gl.uniform1f(locs.u_crtPhosphore, +this.getControl('crtPhosphore').value);
    }

    getPostShaderUniforms() {
      return `
  uniform float u_crt;
  uniform float u_crtScanlines;
  uniform float u_crtScanlinesSize;
  uniform float u_crtFlicker;
  uniform float u_crtVignette;
  uniform float u_crtPhosphore;`;
    }

    getPostShaderGuards() {
      return `
    bool hasCrt = (u_crt > 0.001);`;
    }

    getPostShaderGuardSymbol() {
      return 'hasCrt';
    }

    getPostShaderHelpers() {
      return `
  vec3 applyCRT(vec3 color, vec2 uv, float time) {
    vec3 result = color;

    // Scanlines
    if (u_crtScanlines > 0.001) {
      float lineSize = max(u_crtScanlinesSize, 1.0);
      float line = mod(floor(uv.y * u_resolution.y / lineSize), 2.0);
      float scanMask = 1.0 - line * u_crtScanlines * 0.6;
      result *= scanMask;
    }

    // Flickering par bande horizontale
    if (u_crtFlicker > 0.001) {
      float ft = floor(time * 18.0);
      float band = floor(uv.y * 12.0);
      float flicker = noise21(vec2(band, ft)) * 2.0 - 1.0;
      float bandFlicker = 1.0 + flicker * u_crtFlicker * 0.18;
      float globalFlicker = 1.0 + (noise21(vec2(ft * 0.3, 7.1)) - 0.5) * u_crtFlicker * 0.08;
      result *= bandFlicker * globalFlicker;
    }

    // Vignette
    if (u_crtVignette > 0.0001) {
      vec2 vig = uv * 2.0 - 1.0;
      float radial = vig.x * vig.x + vig.y * vig.y;
      result *= clamp(1.0 - u_crtVignette * 20.0 * radial, 0.0, 1.0);
    }

    // Phosphore : frange verte persistante décalée d'un pixel
    if (u_crtPhosphore > 0.001) {
      vec2 shift = vec2(0.0, 1.0 / u_resolution.y);
      vec3 prev = sampleScene(clamp(uv + shift, 0.0, 1.0));
      vec3 phosphore = vec3(prev.r * 0.18, prev.g * 0.55, prev.b * 0.18);
      result = clamp(result + phosphore * u_crtPhosphore, 0.0, 1.0);
    }

    return mix(color, result, clamp(u_crt, 0.0, 1.0));
  }`;
    }

    getPostShaderPostCode() {
      return `
    if (hasCrt) {
      combined = applyCRT(combined, uv, u_time);
    }`;
    }
  }

        if (!encoded) return;
        const decoded = this.decode(encoded);
        const settings = JSON.parse(decoded);
        if (!settings || typeof settings !== 'object') return;
        this.moduleHost.applySettings(settings);

  class FrameLoopController {
    constructor() {
      this.lastTime = performance.now() * 0.001;
      this.fpsFrames = 0;
      this.fpsLastTime = performance.now();
      this.fpsDisplayed = -1;
      this.fpsEl = document.getElementById('fps');
    }

    getDelta(t) {
      const dt = Math.min(t - this.lastTime, 1 / 20);
      this.lastTime = t;
      return dt;
    }

    start() {
      requestAnimationFrame(this.frame.bind(this));
    }

    frame(nowMs) {
      this.fpsFrames++;
      if (nowMs - this.fpsLastTime >= 1000) {
        const fpsRounded = Math.round(this.fpsFrames * 1000 / (nowMs - this.fpsLastTime));
        if (fpsRounded !== this.fpsDisplayed) {
          this.fpsDisplayed = fpsRounded;
          if (this.fpsEl) this.fpsEl.textContent = fpsRounded + ' FPS';
        }
        this.fpsFrames = 0;
        this.fpsLastTime = nowMs;
      }

      resize();

      const now = nowMs / 1000;
      const dt = this.getDelta(now);

      moduleHost.updateSubjects((extra = {}) => pipelineRuntime.buildPassContext({
        deltaTime: dt,
        time: now,
        ...extra,
      }));
      renderFrameStages(now);

      requestAnimationFrame(this.frame.bind(this));
    }
  }

  function collectPostShaderChunks() {
    const effects = moduleHost.getEffects();
    let uniforms = '', helpers = '', guards = '', pre = '', post = '';
    const guardSymbols = [];
    for (const effect of effects) {
      const effectStack = new EffectStack(effects, effect);
      const context = { effectStack };
      uniforms += effect.getPostShaderUniforms(context) || '';
      helpers += effect.getPostShaderHelpers(context) || '';
      guards += effect.getPostShaderGuards(context) || '';
      pre += effect.getPostShaderPreCode(context) || '';
      post += effect.getPostShaderPostCode(context) || '';
      const sym = effect.getPostShaderGuardSymbol(context);
      if (sym) guardSymbols.push(sym);

        : '';
      return `${effect.constructor.name}:${rebuildKey}`;
    }).join('|');

  uniform float u_time;
${chunks.uniforms}

${sharedPostShaderHelpers}

${chunks.helpers}

  void main() {
    vec2 uv = v_uv;
    vec2 px = 1.0 / u_resolution;
${chunks.guards}
    vec3 combined = sampleScene(uv);
${earlyExit}

  let postProgram = program(quadVS, buildPostFS());

  const quadBuffer = gl.createBuffer();

  function createTexFbo(w, h) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    return {

  function clearFbo(fbo) {

  function rand(a = 0, b = 1) {
    return a + Math.random() * (b - a);

  function clamp(v, a, b) {
    return Math.max(a, Math.min(b, v));
  }
  function fract(x) {
    return x - Math.floor(x);
  }
  function hash2(x, y) {
    return fract(Math.sin(x * 127.1 + y * 311.7) * 43758.5453123);
  }
  function smooth(t) {
    return t * t * (3.0 - 2.0 * t);
  }
  function isCanvasFullscreen() {

  }

    document.getElementById('fullscreenBtn').textContent = label;
  }
  let cursorHideTimeout = null;

    const wrap = document.getElementById('canvasWrap');

  async function toggleFullscreen() {
    const wrap = document.getElementById('canvasWrap');

      if (document.fullscreenElement === wrap) {
        await document.exitFullscreen();
      }
      else {
        await wrap.requestFullscreen();
      }
    }
    catch (err) {
      console.warn('Impossible de basculer en plein écran:', err);
    }
  }
  function resize() {
    const wrap = document.getElementById('canvasWrap');
    const rect = wrap.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.max(2, Math.floor(rect.width * dpr));
    const h = Math.max(2, Math.floor(rect.height * dpr));

  }
  function valueNoise(x, y) {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const a = hash2(xi, yi);
    const b = hash2(xi + 1.0, yi);
    const c = hash2(xi, yi + 1.0);
    const d = hash2(xi + 1.0, yi + 1.0);
    const ux = smooth(xf), uy = smooth(yf);
    return (a * (1.0 - ux) + b * ux) * (1.0 - uy) + (c * (1.0 - ux) + d * ux) * uy;
  }
  function fbm(x, y) {
    let v = 0.0, a = 0.5, fx = x, fy = y;
    for (let i = 0; i < 4; i++) {
      v += valueNoise(fx, fy) * a;
      fx *= 2.02;
      fy *= 2.02;
      a *= 0.5;
    }
    return v;
  }

  function executeSubjectStages(t) {
    moduleHost.renderSubjects((extra = {}) => pipelineRuntime.buildPassContext({
      time: t,
      effects: moduleHost.getEffects(),

  function executeEffectStages(t) {
    const effects = moduleHost.getEffects();
    const runtimeContext = {
      time: t,
      moduleHost,
      state,
    };

    for (const effect of effects) {
      effect.update({ ...runtimeContext });

    postProcessor.render(t);

  function renderFrameStages(t) {
    executeSubjectStages(t);
    executeEffectStages(t);

  setupAllModules();
  resize();
  window.addEventListener('resize', () => {
    resize();
    syncAllModuleValueDisplays();
  });

  const fullscreenBtn = document.getElementById('fullscreenBtn');
  if (fullscreenBtn) fullscreenBtn.addEventListener('click', toggleFullscreen);

  document.addEventListener('fullscreenchange', () => {
    syncFullscreenButton();
    resize();
    syncAllModuleValueDisplays();
    const wrap = document.getElementById('canvasWrap');
    if (document.fullscreenElement === wrap) {
      showCursor();
      wrap.addEventListener('mousemove', showCursor);
    } else {
      wrap.style.cursor = 'default';
      wrap.removeEventListener('mousemove', showCursor);
      if (cursorHideTimeout) clearTimeout(cursorHideTimeout);
    }
  });

  frameLoopController.start();
}
